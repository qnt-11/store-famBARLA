<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#131314">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="STORE famBARLA">
    <title>STORE famBARLA v1.0</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --gemini-bg: #131314; --gemini-grey: #1e1f22; }
        body { font-family: "Segoe UI", sans-serif; background: var(--gemini-bg); color: #ffffff; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        @media print {
            @page { margin: 0; size: auto; }
            body { background: white; margin: 0; padding: 0; }
            body * { display: none !important; }
            #areaStruk, #areaStruk * { display: block !important; visibility: visible !important; }
            #areaStruk { position: absolute; left: 0; top: 0; color: #000; background: white; width: 100%; margin: 0; padding: 0; }
            pre { font-family: 'Courier New', Courier, monospace !important; white-space: pre !important; font-size: 10pt !important; line-height: 1.2 !important; margin: 0; padding: 0; overflow: visible !important; }
        }
        
        .tab-active { background: #2b2d31; color: white !important; }
        .sheet-bg { background: rgba(0, 0, 0, 0.85); z-index: 1000; position: fixed; inset: 0; display: none; align-items: flex-end; }
        .sheet-content { background: var(--gemini-grey); width: 100%; border-radius: 2rem 2rem 0 0; padding: 2rem; transform: translateY(100%); transition: transform 0.3s; }
        .sheet-active .sheet-content { transform: translateY(0); }
        .modal-bg { background: rgba(0, 0, 0, 0.9); position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 20px; z-index: 1500; }
        
        .nav-btn { transition: all 0.2s; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: transparent; border: none; padding-top: 15px; padding-bottom: 10px; }
        .nav-btn i { font-size: 16px; color: #6b7280; transition: color 0.2s; } 
        .nav-btn span { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #6b7280; } 
        .active-nav i, .active-nav span { color: #ffffff !important; }

        .premium-scan { border-radius: 6px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        .premium-scan::before { content: ""; width: 85%; height: 2px; background: #ff0000; position: absolute; box-shadow: 0 0 10px #ff0000; animation: laser 1.8s infinite ease-in-out; z-index: 10; }
        @keyframes laser { 0%, 100% { top: 15%; } 50% { top: 80%; } }

        #scanner-modal-layer video { object-fit: cover !important; }
        input { background-color: var(--gemini-bg) !important; color: #ffffff !important; border: 1px solid #4b5563 !important; }
        
        .m-dual-wrapper { border-width: 2px; border-radius: 1rem; overflow: hidden; background: #131314; display: flex; align-items: stretch; margin-bottom: 10px; }
        .m-label-box { width: 85px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 10px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
        .m-label-box:active { opacity: 0.7; }
        button:focus { outline: none; box-shadow: none; }
        
        .sync-dot { display: none; width: 6px; height: 6px; background-color: #ff0000; border-radius: 50%; position: absolute; top: -2px; right: -2px; box-shadow: 0 0 5px #ff0000; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-[#131314] p-3 text-white shadow-md sticky top-0 z-50 flex justify-between items-center no-print border-b border-[#2b2d31]">
        <div>
            <h1 class="text-base font-black italic uppercase leading-none text-white tracking-wide flex items-baseline gap-1">STORE <span class="text-[8px] font-bold lowercase transform -translate-y-[2px] inline-block">fam</span>BARLA</h1>
            <p id="h-time" class="text-[8px] mt-1 uppercase"></p>
        </div>
        <div class="flex items-center gap-4">
            <div id="h-kasir" class="flex gap-4 items-center">
                <button onclick="bukaHistory()" class="active:scale-75 transition"><i class="fas fa-history text-[18px] text-white"></i></button>
                <button onclick="bukaKameraPopup('auto')" class="active:scale-75 transition"><div class="premium-scan w-7 h-7 border-2 border-white"></div></button>
            </div>
            <div id="h-stok" class="hidden flex items-center gap-3">
                <button onclick="uploadCloud(false)" class="text-sky-400 active:scale-75 transition flex flex-col items-center mt-0.5 relative">
                    <i class="fas fa-cloud-upload-alt text-lg"></i>
                    <span class="text-[7px] font-bold mt-0.5 uppercase text-white">UPLOAD</span>
                    <div id="sync-indicator" class="sync-dot"></div>
                </button>
                <div class="relative flex items-center h-full">
                    <button onclick="toggleMenu('floatingStokMenu')" class="text-white active:scale-75 transition px-2 py-1"><i class="fas fa-ellipsis-v text-sm"></i></button>
                    <div id="floatingStokMenu" class="hidden absolute right-0 top-full mt-3 w-40 p-2 bg-[#1e1f22] border border-[#2b2d31] rounded-xl shadow-2xl z-[300] space-y-1.5">
                        <button onclick="toggleMenu('floatingStokMenu'); exportData();" class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg border border-[#217346] text-[#217346] hover:bg-[#2b2d31] transition"><i class="fas fa-file-export text-base w-5 text-center"></i><span class="text-[10px] font-bold uppercase tracking-wide">Save Excel</span></button>
                        <button onclick="toggleMenu('floatingStokMenu'); document.getElementById('fIn').click();" class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg border border-[#217346] text-[#217346] hover:bg-[#2b2d31] transition"><i class="fas fa-file-import text-base w-5 text-center"></i><span class="text-[10px] font-bold uppercase tracking-wide">Load Excel</span></button>
                        <input type="file" id="fIn" class="hidden" accept=".csv, .xlsx, .xls" onchange="importData(this)">
                        <div class="border-t border-[#2b2d31] my-1"></div>
                        <button onclick="toggleMenu('floatingStokMenu'); konfirmasiDownload();" class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg border border-sky-400 text-white hover:bg-[#2b2d31] transition"><i class="fas fa-cloud-download-alt text-base text-sky-400 w-5 text-center"></i><span class="text-[10px] font-bold uppercase tracking-wide">Load Cloud</span></button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="modal-kamera" class="modal-bg z-[2100]" onclick="if(event.target.id==='modal-kamera') matikanKamera();">
        <div class="bg-[#1e1f22] w-full max-w-sm rounded-3xl p-4 shadow-2xl relative border border-[#2b2d31]">
            <div id="scanner-modal-layer" class="w-full h-72 bg-black rounded-2xl overflow-hidden border-4 border-[#2b2d31]"></div>
            <button onclick="matikanKamera()" class="w-full bg-[#ff0000] text-white font-black py-4 mt-3 rounded-2xl uppercase text-sm italic active:scale-95 transition">Tutup Scanner</button>
        </div>
    </div>

    <main class="max-w-md mx-auto p-2 no-print bg-[#131314]" id="m-content">
        <div id="section-kasir" class="pb-64 pt-1 bg-[#131314]"> 
            <div class="bg-[#1e1f22] p-3 rounded-xl shadow-sm border border-[#2b2d31] mb-2">
                <div class="flex gap-2 mb-2">
                    <div class="relative flex-1">
                        <input type="text" id="k-nama" list="db-list" oninput="handleInputNama(this)" placeholder="Nama Barang / Barcode" class="w-full pl-3 pr-9 py-2 rounded-lg font-bold text-xs outline-none transition-all">
                        <button onclick="clearKasir()" class="absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 flex justify-center items-center text-[#ff0000] rounded-full transition z-10"><i class="fas fa-times text-sm"></i></button>
                        <datalist id="db-list"></datalist>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="relative w-2/5"><span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-[9px] font-black text-white z-10">Rp</span><input type="text" id="k-harga" inputmode="numeric" oninput="formatRupiah(this)" placeholder="Harga" class="w-full pl-7 pr-2 py-2 rounded-lg font-bold text-xs outline-none transition-all"></div>
                    <input type="number" step="0.01" id="k-qty" inputmode="decimal" placeholder="Qty" class="w-1/5 px-1 py-2 rounded-lg font-bold text-xs text-center outline-none transition-all">
                    <button onclick="tambahItem()" class="w-2/5 bg-[#3b82f6] hover:opacity-80 text-white font-bold text-xs rounded-lg shadow-sm active:scale-95 transition flex items-center justify-center gap-1"><i class="fas fa-plus"></i> ADD</button>
                </div>
            </div>
            <div id="list-cart" class="space-y-1.5 bg-[#131314]"></div>
            <div id="p-bayar" class="fixed bottom-[48px] left-0 w-full bg-[#131314] px-4 py-3 shadow-[0_-4px_15px_rgba(0,0,0,0.8)] border-t border-[#2b2d31] z-30">
                <div class="flex justify-between items-center mb-2 gap-3 max-w-md mx-auto">
                    <div class="flex flex-col"><span class="text-[9px] font-black text-white uppercase tracking-wide">Total</span><span id="t-total" class="text-2xl font-black text-[#ff0000] leading-none tracking-tighter">Rp 0</span></div>
                    <div class="w-1/2"><input type="text" id="i-bayar" inputmode="numeric" oninput="formatRupiah(this)" placeholder="Bayar" class="w-full text-right text-base font-black px-3 py-1.5 rounded-lg outline-none"></div>
                </div>
                <div class="max-w-md mx-auto">
                    <div id="b-kembali" class="hidden flex justify-between items-center bg-[#131314] border border-[#4b5563] rounded-lg p-1.5 px-3 mb-2 transition-all"><span class="text-[10px] font-bold text-white uppercase">Kembalian</span><span id="t-kembali" class="text-sm font-black">Rp 0</span></div>
                    <div class="flex gap-2">
                        <button onclick="checkout('wa')" class="flex-1 bg-[#1e1f22] border border-[#25D366] text-[#25D366] font-bold py-2.5 rounded-lg shadow-sm uppercase text-[11px] active:scale-95 transition flex justify-center items-center gap-1.5"><i class="fab fa-whatsapp text-sm"></i> WhatsApp</button>
                        <button onclick="checkout('print')" class="flex-1 bg-[#1e1f22] border border-[#3b82f6] text-[#3b82f6] font-bold py-2.5 rounded-lg shadow-sm uppercase text-[11px] active:scale-95 transition flex justify-center items-center gap-1.5"><i class="fas fa-print text-sm"></i> Cetak</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-stok" class="hidden space-y-4">
            <div id="stok-tabs-container" class="flex bg-[#1e1f22] rounded-xl shadow-sm p-1 border border-[#2b2d31] mb-4 mt-1 items-center">
                <button onclick="toggleStokSearch(true)" id="btn-stok-search" class="px-3 text-[#6b7280] active:scale-90 transition"><i class="fas fa-search text-sm"></i></button>
                <div id="stok-tabs" class="flex flex-1 gap-1">
                    <button onclick="tab('sup')" id="b-sup" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg tab-active transition text-white">Supplier</button>
                    <button onclick="tab('retur')" id="b-retur" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition text-white">Retur</button>
                    <button onclick="tab('lap')" id="b-lap" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition text-white">Laporan</button>
                </div>
                <div id="stok-search-box" class="hidden flex-1 relative items-center">
                    <input type="text" id="i-stok-search" oninput="renderStok(curTab)" placeholder="Cari..." class="w-full py-2 pl-3 pr-8 rounded-lg font-bold text-xs outline-none bg-transparent text-white border-none focus:ring-0">
                    <button onclick="toggleStokSearch(false)" class="absolute right-2 top-1/2 -translate-y-1/2 text-[#ff0000] font-black text-sm p-1"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="stok-content" class="space-y-3 pb-24"></div>
            
            <button onclick="openModalSup()" id="fab" class="fixed right-5 bottom-[100px] w-[56px] h-[56px] bg-[#facc15] text-[#131314] rounded-[16px] shadow-[0_4px_15px_rgba(0,0,0,0.6)] flex items-center justify-center text-2xl z-50 active:scale-90 transition border border-[#ca8a04]">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </main>

    <div id="modal-history" class="modal-bg z-[1600]">
        <div class="bg-[#1e1f22] w-full max-w-sm rounded-3xl p-5 shadow-2xl flex flex-col border border-[#2b2d31]" style="max-height: 85vh;">
            <div class="flex justify-between items-center mb-3 border-b border-[#2b2d31] pb-2"><h3 class="font-black text-[#3b82f6] text-lg uppercase italic"><i class="fas fa-history mr-2"></i>Riwayat Jual</h3><button onclick="tutupHistory()" class="text-[#ff0000] font-bold text-2xl leading-none">&times;</button></div>
            
            <div class="flex flex-col gap-2 mb-3 border-b border-[#2b2d31] pb-3">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-[#6b7280] uppercase">Omzet Lokal Hari Ini:</span>
                    <span id="omzet-hari-ini" class="text-sm font-black text-[#25D366]">Rp 0</span>
                </div>
                <div class="flex gap-2 items-center mt-1">
                    <input type="date" id="input-cari-tanggal" class="flex-1 bg-[#131314] text-white text-xs font-bold p-2 rounded-lg border border-[#4b5563] outline-none">
                    <button onclick="cariRiwayatCloud()" class="bg-[#3b82f6] text-white px-3 py-2.5 rounded-lg text-[10px] font-bold uppercase active:scale-95 transition whitespace-nowrap"><i class="fas fa-cloud-download-alt mr-1"></i> Cari Cloud</button>
                </div>
            </div>

            <div id="history-content" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            <button onclick="hapusHistory()" class="mt-3 w-full py-3 bg-[#2b2d31] border border-[#ff0000] text-[#ff0000] rounded-xl text-xs font-black uppercase transition-all">Bersihkan Riwayat Lokal</button>
        </div>
    </div>

    <div id="b-modal-isi-grosir" class="modal-bg z-[2200]">
        <div class="bg-[#1e1f22] w-full max-w-xs rounded-3xl p-6 shadow-2xl space-y-4 border-t-[8px] border-[#6b7280]">
            <h3 id="ig-title" class="font-black text-center uppercase text-lg italic text-[#6b7280]">ISI PER GROSIR</h3>
            <div class="flex gap-2 items-center rounded-2xl border-2 overflow-hidden bg-transparent border-[#6b7280]">
                <input type="number" id="ig-input" placeholder="0" class="flex-1 w-0 p-3 bg-transparent border-none text-center text-xl font-black outline-none text-white">
            </div>
            <div class="flex gap-2 pt-1">
                <button onclick="document.getElementById('b-modal-isi-grosir').style.display='none'" class="flex-1 py-3 text-xs font-black text-white uppercase rounded-xl hover:bg-[#2b2d31] border border-[#6b7280] transition">Batal</button>
                <button id="ig-confirm" tabindex="-1" class="flex-1 py-3 text-white rounded-xl text-xs font-black shadow-sm uppercase active:scale-95 transition bg-[#6b7280]">Oke</button>
            </div>
        </div>
    </div>

    <div id="modal-retur-step1" class="modal-bg z-[1600]">
        <div class="bg-[#1e1f22] w-full max-w-xs rounded-3xl p-6 shadow-2xl space-y-4 border-t-[8px] border-[#facc15]">
            <h3 class="font-black text-center uppercase text-lg italic text-[#facc15]">RETUR BARANG</h3>
            <p id="mr-nama-brg" class="text-[11px] text-white font-bold text-center uppercase whitespace-pre-wrap"></p>
            <div class="space-y-2 mt-4">
                <button id="btn-retur-in" onclick="selectReturType('in')" class="w-full p-3 rounded-xl font-bold uppercase text-[11px] border border-[#4b5563] text-[#6b7280] bg-[#2b2d31] transition">RETUR DARI PEMBELI</button>
                <button id="btn-retur-out" onclick="selectReturType('out')" class="w-full p-3 rounded-xl font-bold uppercase text-[11px] border border-[#4b5563] text-[#6b7280] bg-[#2b2d31] transition">RETUR KE SUPPLIER</button>
            </div>
            <div class="flex gap-2 pt-2">
                <button onclick="document.getElementById('modal-retur-step1').style.display='none'" class="flex-1 py-3 text-xs font-black text-white uppercase rounded-xl hover:bg-[#2b2d31] border border-[#facc15] transition">Batal</button>
                <button onclick="confirmReturStep1()" tabindex="-1" id="btn-retur-confirm" class="flex-1 py-3 text-black bg-[#facc15] rounded-xl text-xs font-black shadow-sm uppercase active:scale-95 transition">OK</button>
            </div>
        </div>
    </div>

    <div id="a-sheet" class="sheet-bg" onclick="closeSheet(event)"><div class="sheet-content border-t border-[#2b2d31]"><div id="sheet-opts" class="grid gap-3"></div></div></div>
    
    <div id="b-modal" class="modal-bg z-[1800]">
        <div class="bg-[#1e1f22] w-full max-w-xs rounded-3xl p-6 shadow-2xl space-y-4 border-t-[8px]" id="m-border">
            <h3 id="m-title" class="font-black text-center uppercase text-lg italic transition-colors"></h3>
            <p id="m-desc" class="text-[11px] text-white font-bold text-center uppercase whitespace-pre-wrap"></p>
            
            <div id="m-dual-input" style="display:none;" class="space-y-0">
                <div class="m-dual-wrapper" id="m-dw-ecer">
                    <input type="text" inputmode="decimal" id="m-input-kecil" placeholder="0" class="flex-1 w-0 p-3 bg-transparent border-none text-center text-xl font-black outline-none text-white">
                    <div class="m-label-box relative" id="m-lb-ecer">
                        <span id="m-label-kecil" class="m-auto text-white flex items-center gap-1"></span>
                        <div id="m-dd-ecer" class="hidden absolute top-[110%] left-0 w-full min-w-[100px] bg-[#1e1f22] border border-[#4b5563] rounded-lg shadow-xl z-[3000] overflow-hidden"></div>
                    </div>
                </div>
                <div class="m-dual-wrapper" id="m-dw-grosir">
                    <input type="text" inputmode="decimal" id="m-input-besar" placeholder="0" class="flex-1 w-0 p-3 bg-transparent border-none text-center text-xl font-black outline-none text-white">
                    <div class="m-label-box relative" id="m-lb-grosir">
                        <span id="m-label-besar" class="m-auto text-white flex items-center gap-1"></span>
                        <div id="m-dd-grosir" class="hidden absolute top-[110%] left-0 w-full min-w-[100px] bg-[#1e1f22] border border-[#4b5563] rounded-lg shadow-xl z-[3000] overflow-hidden"></div>
                    </div>
                </div>
            </div>

            <div id="m-dual-barcode" style="display:none;" class="space-y-2">
                <div class="relative flex items-center bg-[#000] rounded-xl overflow-hidden border border-[#ffffff]">
                    <input id="mb-input-kecil" inputmode="numeric" placeholder="BC SATUAN" class="w-full p-3 bg-transparent border-none text-xs outline-none text-white font-bold tracking-widest text-center">
                    <div class="premium-scan absolute right-2 w-6 h-6 border border-white/20"></div>
                    <button onclick="bukaKameraPopup('mb-input-kecil')" class="absolute inset-0 z-20"></button>
                </div>
                <div class="relative flex items-center bg-[#000] rounded-xl overflow-hidden border border-[#ffffff]">
                    <input id="mb-input-besar" inputmode="numeric" placeholder="BC GROSIR" class="w-full p-3 bg-transparent border-none text-xs outline-none text-white font-bold tracking-widest text-center">
                    <div class="premium-scan absolute right-2 w-6 h-6 border border-white/20"></div>
                    <button onclick="bukaKameraPopup('mb-input-besar')" class="absolute inset-0 z-20"></button>
                </div>
            </div>

            <div id="m-single-input-box" style="display:none;" class="flex gap-2 items-center rounded-2xl border-2 overflow-hidden transition-colors">
                <input type="text" id="m-input" class="flex-1 w-0 p-3 bg-transparent border-none text-center text-xl font-black outline-none text-white">
                <button id="m-scan-btn" style="display:none;" class="w-12 h-12 shrink-0 bg-transparent flex items-center justify-center active:scale-90 transition pr-2"><div class="premium-scan w-8 h-8 border border-white"></div></button>
            </div>
            
            <div class="flex gap-2 pt-1" id="m-btn-container">
                <button id="m-cancel" onclick="closeModal()" style="display:none;" class="flex-1 py-3 text-xs font-black text-white uppercase rounded-xl hover:bg-[#2b2d31] border border-[#4b5563] transition">Batal</button>
                <button id="m-back" onclick="backToStep1()" style="display:none;" class="flex-1 py-3 text-xs font-black text-[#6b7280] uppercase rounded-xl hover:bg-[#2b2d31] border border-[#4b5563] transition">Kembali</button>
                <button id="m-confirm" tabindex="-1" class="flex-1 py-3 text-white rounded-xl text-xs font-black shadow-sm uppercase active:scale-95 transition z-[2300] relative">Oke</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#131314] border-t border-[#2b2d31] flex justify-around no-print z-50">
        <button onclick="navMode('kasir')" id="n-k" class="nav-btn active-nav"><i class="fas fa-store"></i><span>Kasir</span></button>
        <button onclick="navMode('stok')" id="n-s" class="nav-btn"><i class="fas fa-box-open"></i><span>Stok</span></button>
    </nav>
    <div id="areaStruk" class="hidden"><div id="p-konten"></div></div>

    <script>
        const KEY = 'STORE_FAM_BARLA_V1_0';
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbxvJrsYnzrjdcLHZDsjg3CPHS6UVuRJyUVkb3Dv86GGly4mkSml-oOt59yQIE0ORWW0/exec"; 

        let db = { supplier: [], retur: [], history: [] }; 
        let cart = []; let tempCloudHistory = [];
        let isScanning = false, html5QrCode = null, curTab = 'sup', selS = null, selB = null, openIdx = null, pendingIdxGrosir = null; 
        let isKasirGrosir = false, selKasirSup = null, activeReturType = null, activeReturItem = null, curDropdownOpen = null, activeDropdownCallback = null;
        let unuploadedData = false; 
        let lastBackupDate = "";

        function printReturSemua() { let h = `          STORE famBARLA         \n     Ps. Sunggingan Lt. 2      \n-------------------------------\nREKAP RETUR - ${getTglStr()}\n-------------------------------\n`; const g = db.retur.reduce((a,r)=>{(a[r.sup]=a[r.sup]||[]);a[r.sup].push(r);return a;},{}); for(let s in g){ h += `• ${escapeHTML(s).toUpperCase()}\n`; g[s].forEach(r=> h += `  ${escapeHTML(r.nama).substring(0,18).padEnd(19)} ${r.type==='in'?'+':'-'}${escapeHTML(r.qtyStr)}\n`); h += `\n`; } document.getElementById('p-konten').innerHTML = `<pre>${h}</pre>`; window.print(); }
        function printReturSup(sn) { let h = `          STORE famBARLA         \n     Ps. Sunggingan Lt. 2      \n-------------------------------\nRETUR: ${escapeHTML(sn).toUpperCase()}\n-------------------------------\n`; db.retur.filter(x=>x.sup===sn).forEach(r=> h += `${escapeHTML(r.nama).substring(0,18).padEnd(19)} ${r.type==='in'?'+':'-'}${escapeHTML(r.qtyStr)}\n`); document.getElementById('p-konten').innerHTML = `<pre>${h}</pre>`; window.print(); }
        function printLapSemua() { let h = `          STORE famBARLA         \n     Ps. Sunggingan Lt. 2      \n-------------------------------\nLAPORAN STOK - ${getTglStr()}\n-------------------------------\n`; db.supplier.forEach(s=>{ const k=s.barang.filter(b=>{ if(b.sB && b.isi > 0) { let krt = Math.floor(b.stok / b.isi); return krt <= getMinLimit(b.sB); } else { return b.stok <= getMinLimit(b.sK); }}); if(k.length>0){ h += `• ${escapeHTML(s.nama).toUpperCase()}\n`; k.forEach(b=> h += `  ${escapeHTML(b.nama).substring(0,18).padEnd(19)} ${formatStok(b.stok, b.isi, b.sK, b.sB)}\n`); h += `\n`; } }); document.getElementById('p-konten').innerHTML=`<pre>${h}</pre>`; window.print(); }
        function waR(sn) { let h = `*RETUR famBARLA*\nSupplier: ${sn}\n-------------------\n`; db.retur.filter(x=>x.sup===sn).forEach(r=> h += `• ${r.nama}: ${r.type==='in'?'+':'-'}${r.qtyStr}\n`); window.open(`https://wa.me/?text=${encodeURIComponent(h)}`); }
        function waO(i) { let s=db.supplier[i], h = `*ORDER famBARLA*\nSupplier: ${s.nama}\n-------------------\n`; s.barang.filter(b=>{ if(b.sB && b.isi > 0) { let krt = Math.floor(b.stok / b.isi); return krt <= getMinLimit(b.sB); } else { return b.stok <= getMinLimit(b.sK); }}).forEach(b=> h += `• ${b.nama}: (Sisa ${formatStok(b.stok, b.isi, b.sK, b.sB)})\n`); window.open(`https://wa.me/?text=${encodeURIComponent(h)}`); }
        function trHR(sn) { openModal("HAPUS?", "", `Hapus data retur ${sn}?`, () => { db.retur=db.retur.filter(x=>x.sup!==sn); saveData(); renderStok('retur'); }, "confirm"); }
        
        window.addEventListener('online', () => {
            if (unuploadedData && (Date.now() - lastSyncAttempt > 60000)) {
                lastSyncAttempt = Date.now();
                uploadCloud(true); 
            }
        });
    </script>

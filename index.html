<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="store famBARLA">
    <title>store famBARLA v1.0</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --gemini-bg: #000000; }
        body { font-family: "Segoe UI", sans-serif; background: var(--gemini-bg); color: #ffffff; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* FONT & ANIMASI LED HEADER */
        .audiowide-regular { font-family: "Audiowide", sans-serif; font-weight: 400; font-style: normal; }
        .led-matrix-text { color: #333333; }
        /* ANIMASI DIPERLAMBAT MENJADI 4.5s */
        .led-char { animation: led-sweep 4.5s infinite; }
        @keyframes led-sweep {
            0%, 100% { color: #333333; text-shadow: none; }
            10% { color: #ff0000; text-shadow: 0 0 5px #ff0000, 0 0 15px #ff0000; }
            20%, 90% { color: #333333; text-shadow: none; }
        }

        /* ANIMASI MENU GARIS TIGA BERURUTAN */
        .menu-lines { display: flex; flex-direction: column; gap: 3px; justify-content: center; align-items: center; width: 14px; height: 12px; }
        .menu-line { height: 2px; width: 100%; background-color: #808080; border-radius: 2px; animation: laser-run 3s infinite; }
        .menu-line:nth-child(1) { animation-delay: 0s; }
        .menu-line:nth-child(2) { animation-delay: 0.5s; }
        .menu-line:nth-child(3) { animation-delay: 1.0s; }
        @keyframes laser-run {
            0%, 100% { background-color: #808080; box-shadow: none; }
            50% { background-color: #ff0000; box-shadow: 0 0 2px #ff0000, 0 0 6px #ff0000; }
        }

        @media print {
            @page { margin: 0; size: auto; }
            body { background: white; margin: 0; padding: 0; }
            body * { display: none !important; }
            #areaStruk, #areaStruk * { display: block !important; visibility: visible !important; }
            #areaStruk { position: absolute; left: 0; top: 0; color: #000; background: white; width: 100%; margin: 0; padding: 0; }
            pre { font-family: 'Courier New', Courier, monospace !important; white-space: pre !important; font-size: 10pt !important; line-height: 1.2 !important; margin: 0; padding: 0; overflow: visible !important; }
        }
        
        /* TAMPILAN TAB AKTIF MERAH MENYALA TANPA GARIS BAWAH */
        .tab-active { color: #ff0000 !important; text-shadow: 0 0 8px rgba(255, 0, 0, 0.8); }
        
        .sheet-bg { background: rgba(0, 0, 0, 0.85); z-index: 1000; position: fixed; inset: 0; display: none; align-items: flex-end; }
        .sheet-content { background: #000000; width: 100%; border-radius: 2rem 2rem 0 0; padding: 2rem; transform: translateY(100%); transition: transform 0.3s; border-top: 1px solid #666666;}
        .sheet-active .sheet-content { transform: translateY(0); }
        .modal-bg { background: rgba(0, 0, 0, 0.9); position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 20px; z-index: 1500; }

        .premium-scan { border-radius: 6px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000000; border: 1px solid #ffffff !important; }
        .premium-scan::before { content: ""; width: 85%; height: 2px; background: #ff0000; position: absolute; animation: laser 1.8s infinite ease-in-out; z-index: 10; }
        @keyframes laser { 0%, 100% { top: 15%; } 50% { top: 80%; } }

        #scanner-modal-layer video { object-fit: cover !important; }
        
        input:not(.border-none) { background-color: var(--gemini-bg) !important; color: #ffffff !important; border: 1px solid #666666 !important; }
        input.border-none { background-color: transparent !important; color: #ffffff !important; border: none !important; outline: none !important; }
        
        .m-dual-wrapper { border-width: 1px; border-radius: 1rem; background: #000000; display: flex; align-items: stretch; margin-bottom: 10px; border-color: #666666; position: relative; }
        .m-label-box { width: 85px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 10px; text-transform: uppercase; cursor: pointer; transition: background-color 0.2s; background: transparent; border-left: 1px solid #666666; color: #808080;}
        button:focus { outline: none; box-shadow: none; }
        
        .sync-dot { display: none; width: 6px; height: 6px; background-color: #ff0000; border-radius: 50%; position: absolute; top: -2px; right: -2px; }
    </style>
</head>
<body class="pb-6">

    <header class="bg-[#000000] p-3 text-white sticky top-0 z-50 flex justify-between items-center no-print border-b border-[#666666]">
        <div>
            <h1 class="text-[17px] leading-none tracking-wide flex items-baseline gap-1.5 audiowide-regular led-matrix-text">
                <span class="flex">
                    <span class="led-char" style="animation-delay: 0.0s">s</span>
                    <span class="led-char" style="animation-delay: 0.1s">t</span>
                    <span class="led-char" style="animation-delay: 0.2s">o</span>
                    <span class="led-char" style="animation-delay: 0.3s">r</span>
                    <span class="led-char" style="animation-delay: 0.4s">e</span>
                </span>
                <span class="flex items-baseline">
                    <span class="text-[9px] transform -translate-y-[1px] flex">
                        <span class="led-char" style="animation-delay: 0.6s">f</span>
                        <span class="led-char" style="animation-delay: 0.7s">a</span>
                        <span class="led-char" style="animation-delay: 0.8s">m</span>
                    </span>
                    <span class="flex">
                        <span class="led-char" style="animation-delay: 0.9s">B</span>
                        <span class="led-char" style="animation-delay: 1.0s">A</span>
                        <span class="led-char" style="animation-delay: 1.1s">R</span>
                        <span class="led-char" style="animation-delay: 1.2s">L</span>
                        <span class="led-char" style="animation-delay: 1.3s">A</span>
                    </span>
                </span>
            </h1>
            <p id="h-time" class="text-[8px] mt-1 uppercase font-bold text-[#808080]"><span class="text-[#808080]" id="date-part"></span> <span class="text-[#ff0000] font-black ml-1" id="time-part"></span></p>
        </div>
        
        <button onclick="openMenuModal()" class="border border-[#ff0000] text-[#ffffff] font-bold text-[10px] px-4 py-2 rounded-full uppercase tracking-widest transition-colors active:text-white active:border-white bg-[#1a1a1a] mx-2 flex-shrink-0 flex items-center gap-1.5 shadow-sm">
            <div class="menu-lines">
                <div class="menu-line"></div>
                <div class="menu-line"></div>
                <div class="menu-line"></div>
            </div>
            <span class="audiowide-regular">MENU</span>
        </button>

        <div class="flex items-center gap-4">
            <div id="h-kasir" class="flex gap-4 items-center">
                <button onclick="bukaHistory()" class="transition-colors active:text-white"><i class="fas fa-history text-[18px] text-[#808080]"></i></button>
                <button onclick="bukaKameraPopup('auto')" class="transition-colors"><div class="premium-scan w-7 h-7 border border-[#ffffff]"></div></button>
            </div>
            <div id="h-stok" class="hidden flex items-center gap-3">
                <button onclick="uploadCloud(false)" class="text-[#38bdf8] transition-colors active:text-white flex flex-col items-center mt-0.5 relative">
                    <i class="fas fa-cloud-upload-alt text-lg"></i>
                    <span class="text-[7px] font-bold mt-0.5 uppercase text-[#38bdf8] audiowide-regular">UPLOAD</span>
                    <div id="sync-indicator" class="sync-dot"></div>
                </button>
                <div class="relative flex items-center h-full">
                    <button onclick="toggleMenu('floatingStokMenu')" class="text-[#808080] transition-colors active:text-white px-2 py-1"><i class="fas fa-ellipsis-v text-sm"></i></button>
                    <div id="floatingStokMenu" class="hidden absolute right-0 top-full mt-3 w-40 p-2 bg-[#000000] border border-[#666666] rounded-xl z-[300] space-y-1.5">
                        <button onclick="toggleMenu('floatingStokMenu'); exportData();" class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg border border-[#217346] text-[#217346] transition-colors bg-transparent active:text-white active:border-white"><i class="fas fa-file-export text-base w-5 text-center"></i><span class="text-[10px] font-bold uppercase tracking-wide audiowide-regular">Save Excel</span></button>
                        <button onclick="toggleMenu('floatingStokMenu'); document.getElementById('fIn').click();" class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg border border-[#217346] text-[#217346] transition-colors bg-transparent active:text-white active:border-white"><i class="fas fa-file-import text-base w-5 text-center"></i><span class="text-[10px] font-bold uppercase tracking-wide audiowide-regular">Load Excel</span></button>
                        <input type="file" id="fIn" class="hidden" accept=".csv, .xlsx, .xls" onchange="importData(this)">
                        <div class="border-t border-[#666666] my-1"></div>
                        <button onclick="toggleMenu('floatingStokMenu'); konfirmasiDownload();" class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg border border-[#38bdf8] text-[#38bdf8] transition-colors bg-transparent active:text-white active:border-white"><i class="fas fa-cloud-download-alt text-base w-5 text-center"></i><span class="text-[10px] font-bold uppercase tracking-wide audiowide-regular">Load Cloud</span></button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="modal-kamera" class="modal-bg z-[2100]" onclick="if(event.target.id==='modal-kamera') matikanKamera();">
        <div class="bg-[#000000] w-full max-w-sm rounded-3xl p-4 relative border border-[#ff0000]">
            <div id="scanner-modal-layer" class="w-full h-72 bg-[#000000] rounded-2xl overflow-hidden border border-[#ffffff]"></div>
            <button onclick="matikanKamera()" class="w-full bg-transparent border border-[#ff0000] text-[#ff0000] font-black py-4 mt-3 rounded-2xl uppercase text-sm transition-colors active:text-white active:border-white">Tutup Scanner</button>
        </div>
    </div>

    <div id="modal-menu-nav" class="modal-bg z-[2000]">
        <div class="bg-[#000000] w-full max-w-xs rounded-3xl p-6 space-y-4 border border-[#666666]">
            <h3 class="font-black text-center uppercase text-lg italic text-[#666666] border-b border-[#666666] pb-3 audiowide-regular">PILIH MENU</h3>
            <div class="space-y-3 pt-2">
                <button id="btn-nav-kasir" onclick="pilihMenu('kasir')" class="w-full flex items-center justify-center gap-3 p-4 rounded-xl font-bold uppercase text-xs border bg-transparent transition-colors active:text-white active:border-white audiowide-regular">
                    <i class="fas fa-store text-lg"></i> KASIR
                </button>
                <button id="btn-nav-stok" onclick="pilihMenu('stok')" class="w-full flex items-center justify-center gap-3 p-4 rounded-xl font-bold uppercase text-xs border bg-transparent transition-colors active:text-white active:border-white audiowide-regular">
                    <i class="fas fa-box-open text-lg"></i> STOK
                </button>
            </div>
            <button onclick="document.getElementById('modal-menu-nav').style.display='none'; activeModalId = null;" class="w-full mt-3 py-3 text-xs font-black text-[#ff0000] uppercase rounded-xl border border-[#ff0000] transition-colors active:text-white active:border-white bg-transparent audiowide-regular">Batal</button>
        </div>
    </div>

    <main class="max-w-md mx-auto p-2 no-print bg-[#000000]" id="m-content">
        <div id="section-kasir" class="pb-32 pt-1 bg-[#000000]"> 
            <div class="bg-[#000000] p-3 rounded-xl border border-[#666666] mb-2">
                <div class="flex gap-2 mb-2">
                    <div class="relative flex-1">
                        <input type="text" id="k-nama" list="db-list" oninput="handleInputNama(this)" placeholder="Nama Barang / Barcode" class="w-full pl-3 pr-9 py-2 rounded-lg font-bold text-xs outline-none transition-colors placeholder-[#808080] text-[#ffffff] bg-[#000000]">
                        <button onclick="clearKasir()" class="absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 flex justify-center items-center text-[#ff0000] rounded-full transition-colors active:text-white z-10"><i class="fas fa-times text-sm"></i></button>
                        <datalist id="db-list"></datalist>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="relative w-2/5"><span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-[9px] font-black text-[#808080] z-10">Rp</span><input type="text" id="k-harga" inputmode="numeric" oninput="formatRupiah(this)" placeholder="Harga" class="w-full pl-7 pr-2 py-2 rounded-lg font-bold text-xs outline-none transition-colors placeholder-[#808080] text-[#ffffff] bg-[#000000]"></div>
                    <input type="text" id="k-qty" inputmode="decimal" placeholder="Qty" class="w-1/5 px-1 py-2 rounded-lg font-bold text-xs text-center outline-none transition-colors placeholder-[#808080] text-[#ffffff] bg-[#000000]">
                    <button onclick="tambahItem()" class="w-2/5 bg-transparent border border-[#3b82f6] text-[#3b82f6] font-bold text-xs rounded-lg transition-colors active:text-white active:border-white flex items-center justify-center gap-1 uppercase audiowide-regular"><i class="fas fa-plus"></i> ADD</button>
                </div>
            </div>
            <div id="list-cart" class="space-y-1.5 bg-[#000000]"></div>
            <div id="p-bayar" class="fixed bottom-0 left-0 w-full bg-[#000000] px-4 py-3 border-t border-[#666666] z-30">
                <div class="flex justify-between items-center mb-2 gap-3 max-w-md mx-auto">
                    <div class="flex flex-col"><span class="text-[9px] font-black text-[#808080] uppercase tracking-wide audiowide-regular">Total</span><span id="t-total" class="text-2xl font-black text-[#ff0000] leading-none tracking-tighter">Rp 0</span></div>
                    <div class="w-1/2"><input type="text" id="i-bayar" inputmode="numeric" oninput="formatRupiah(this)" placeholder="Bayar" class="w-full text-right text-base font-black px-3 py-1.5 rounded-lg outline-none placeholder-[#808080] text-[#ffffff] bg-[#000000]"></div>
                </div>
                <div class="max-w-md mx-auto">
                    <div id="b-kembali" class="hidden flex justify-between items-center bg-[#000000] border border-[#666666] rounded-lg p-1.5 px-3 mb-2 transition-colors"><span class="text-[10px] font-bold text-[#808080] uppercase audiowide-regular">Kembalian</span><span id="t-kembali" class="text-sm font-black">Rp 0</span></div>
                    <div class="flex gap-2">
                        <button onclick="checkout('wa')" class="flex-1 bg-transparent border border-[#25D366] text-[#25D366] font-bold py-2.5 rounded-lg uppercase text-[11px] transition-colors active:text-white active:border-white flex justify-center items-center gap-1.5 audiowide-regular"><i class="fab fa-whatsapp text-sm"></i> WhatsApp</button>
                        <button onclick="checkout('print')" class="flex-1 bg-transparent border border-[#3b82f6] text-[#3b82f6] font-bold py-2.5 rounded-lg uppercase text-[11px] transition-colors active:text-white active:border-white flex justify-center items-center gap-1.5 audiowide-regular"><i class="fas fa-print text-sm"></i> Cetak</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-stok" class="hidden space-y-4">
            <div id="stok-tabs-container" class="flex bg-[#000000] rounded-xl p-1 border border-[#666666] mb-4 mt-1 items-center">
                <button onclick="toggleStokSearch(true)" id="btn-stok-search" class="px-3 text-[#808080] transition-colors active:text-white"><i class="fas fa-search text-sm"></i></button>
                <div id="stok-tabs" class="flex flex-1 gap-1">
                    <button onclick="tab('sup')" id="b-sup" class="audiowide-regular flex-1 py-2 text-[10px] uppercase rounded-lg tab-active transition-colors text-[#808080] bg-transparent">Supplier</button>
                    <button onclick="tab('retur')" id="b-retur" class="audiowide-regular flex-1 py-2 text-[10px] uppercase rounded-lg transition-colors text-[#808080] bg-transparent">Retur</button>
                    <button onclick="tab('lap')" id="b-lap" class="audiowide-regular flex-1 py-2 text-[10px] uppercase rounded-lg transition-colors text-[#808080] bg-transparent">Laporan</button>
                </div>
                <div id="stok-search-box" class="hidden flex-1 relative items-center">
                    <input type="text" id="i-stok-search" oninput="renderStok(curTab)" placeholder="Cari..." class="border-none w-full py-2 pl-3 pr-8 rounded-lg font-bold text-xs outline-none bg-transparent text-[#ffffff] focus:ring-0 placeholder-[#808080]">
                    <button onclick="toggleStokSearch(false)" class="absolute right-2 top-1/2 -translate-y-1/2 text-[#ff0000] font-black text-sm p-1 transition-colors active:text-white"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="stok-content" class="space-y-3 pb-24"></div>
            
            <button onclick="openModalSup()" id="fab" class="fixed right-5 bottom-5 w-[56px] h-[56px] bg-transparent text-[#ffffff] rounded-[16px] flex items-center justify-center text-2xl z-50 transition-colors active:text-[#666666] active:border-[#666666] border border-[#ffffff]">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </main>

    <div id="modal-history" class="modal-bg z-[1600]">
        <div class="bg-[#000000] w-full max-w-sm rounded-3xl p-5 flex flex-col border border-[#666666]" style="max-height: 85vh;">
            <div class="flex justify-between items-center mb-3 border-b border-[#666666] pb-2"><h3 class="font-black text-[#ffffff] text-lg uppercase italic audiowide-regular"><i class="fas fa-history mr-2 text-[#808080]"></i>Riwayat Jual</h3><button onclick="tutupHistory()" class="text-[#808080] font-bold text-2xl leading-none transition-colors active:text-white">&times;</button></div>
            
            <div class="flex flex-col gap-2 mb-3 border-b border-[#666666] pb-3">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-[#808080] uppercase">Omzet Lokal Hari Ini:</span>
                    <span id="omzet-hari-ini" class="text-sm font-black text-[#ffffff]">Rp 0</span>
                </div>
                <div class="flex gap-2 items-center mt-1">
                    <input type="text" readonly id="input-cari-tanggal" onclick="openCalendar('input-cari-tanggal')" placeholder="Pilih Tanggal..." class="flex-1 text-xs font-bold p-2.5 rounded-lg outline-none bg-[#000000] border border-[#666666] text-[#ffffff] text-center cursor-pointer">
                    <button onclick="cariRiwayatCloud()" class="bg-transparent border border-[#38bdf8] text-[#38bdf8] px-3 py-2.5 rounded-lg text-[10px] font-bold uppercase transition-colors active:text-white active:border-white whitespace-nowrap audiowide-regular"><i class="fas fa-cloud-download-alt mr-1"></i> Cari Cloud</button>
                </div>
            </div>

            <div id="history-content" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            <button onclick="hapusHistory()" class="mt-3 w-full py-3 bg-transparent border border-[#ff0000] text-[#ff0000] rounded-xl text-xs font-black uppercase transition-colors active:text-white active:border-white audiowide-regular">Bersihkan Riwayat Lokal</button>
        </div>
    </div>

    <div id="modal-calendar" class="modal-bg z-[2500]">
        <div class="bg-[#111111] w-full max-w-[280px] rounded-3xl overflow-hidden border border-[#ff0000] shadow-2xl">
            <div class="bg-[#1f1f1f] p-4 text-[#ffffff] border-b border-[#666666]">
                <div id="cal-year" class="text-xs text-[#808080] font-bold audiowide-regular">2026</div>
                <div id="cal-date-display" class="text-2xl font-black mt-1 tracking-tight audiowide-regular">Sel, 21 Apr</div>
            </div>
            <div class="p-4 bg-[#000000]">
                <div class="flex justify-between items-center mb-4 px-2">
                    <button onclick="changeMonth(-1)" class="text-[#808080] text-lg active:text-[#ff0000] transition-colors"><i class="fas fa-chevron-left"></i></button>
                    <span id="cal-month-year" class="font-bold text-xs text-[#ffffff] uppercase tracking-wider audiowide-regular">April 2026</span>
                    <button onclick="changeMonth(1)" class="text-[#808080] text-lg active:text-[#ff0000] transition-colors"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-[9px] font-black text-[#808080] mb-2 uppercase audiowide-regular">
                    <div>M</div><div>S</div><div>S</div><div>R</div><div>K</div><div>J</div><div>S</div>
                </div>
                <div id="cal-grid" class="grid grid-cols-7 gap-1 text-center text-xs font-bold mb-4 audiowide-regular"></div>
                <div class="flex justify-end gap-5 mt-2 pt-3 border-t border-[#666666]">
                    <button onclick="closeCalendar()" class="text-[#808080] font-black text-[11px] uppercase tracking-widest active:text-white transition-colors audiowide-regular">Batal</button>
                    <button onclick="setCalendar()" class="text-[#ff0000] font-black text-[11px] uppercase tracking-widest active:text-white transition-colors audiowide-regular">Setel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="b-modal-isi-grosir" class="modal-bg z-[2200]">
        <div class="bg-[#000000] w-full max-w-xs rounded-3xl p-6 space-y-4 border border-[#666666]">
            <h3 id="ig-title" class="font-black text-center uppercase text-lg italic text-[#ffffff] audiowide-regular">ISI PER GROSIR</h3>
            <div class="flex gap-2 items-center rounded-2xl border overflow-hidden bg-[#000000] border-[#666666]">
                <input type="number" id="ig-input" placeholder="0" class="border-none flex-1 w-0 p-3 bg-transparent text-center text-xl font-black outline-none text-[#ffffff]">
            </div>
            <div class="flex gap-2 pt-1">
                <button onclick="document.getElementById('b-modal-isi-grosir').style.display='none'" class="flex-1 py-3 text-xs font-black text-[#ffffff] uppercase rounded-xl border border-[#ffffff] transition-colors active:text-white active:border-white bg-transparent audiowide-regular">Batal</button>
                <button id="ig-confirm" tabindex="-1" class="flex-1 py-3 text-[#808080] rounded-xl text-xs font-black uppercase transition-colors active:text-white active:border-white bg-transparent border border-[#666666] audiowide-regular">Oke</button>
            </div>
        </div>
    </div>

    <div id="modal-retur-step1" class="modal-bg z-[1600]">
        <div class="bg-[#000000] w-full max-w-xs rounded-3xl p-6 space-y-4 border border-[#facc15]">
            <h3 class="font-black text-center uppercase text-lg italic text-[#ffffff] audiowide-regular">RETUR BARANG</h3>
            <p id="mr-nama-brg" class="text-[11px] text-[#ffffff] font-bold text-center uppercase whitespace-pre-wrap"></p>

                <button onclick="confirmReturStep1()" tabindex="-1" id="btn-retur-confirm" class="flex-1 py-3 text-[#808080] border border-[#666666] bg-transparent rounded-xl text-xs font-black uppercase transition-colors active:text-white active:border-white audiowide-regular">OK</button>

                        <span id="m-label-besar" class="m-auto text-[#ffffff] flex items-center gap-1"></span>
                        <div id="m-dd-grosir" class="hidden absolute top-[110%] left-0 w-full min-w-[100px] bg-[#000000] border border-[#666666] rounded-lg z-[3000] overflow-hidden"></div>

                    <button onclick="bukaKameraPopup('mb-input-kecil')" class="absolute right-0 top-0 bottom-0 w-10 flex items-center justify-center z-20 transition-colors"><div class="premium-scan w-6 h-6 border border-[#ffffff]"></div></button>

                <div class="relative flex items-center bg-[#000000] rounded-xl overflow-hidden border border-[#ffffff]">
                    <input id="mb-input-besar" inputmode="numeric" placeholder="BC GROSIR" class="border-none w-full p-3 pr-10 bg-transparent text-xs outline-none text-[#ffffff] font-bold tracking-widest text-center placeholder-[#808080]">
                    <button onclick="bukaKameraPopup('mb-input-besar')" class="absolute right-0 top-0 bottom-0 w-10 flex items-center justify-center z-20 transition-colors"><div class="premium-scan w-6 h-6 border border-[#ffffff]"></div></button>

                <input type="text" id="m-input" class="border-none flex-1 w-0 p-3 bg-transparent text-center text-xl font-black outline-none text-[#ffffff]">

            <div class="flex gap-2 pt-1" id="m-btn-container">
                <button id="m-cancel" onclick="closeModal()" style="display:none;" class="flex-1 py-3 text-xs font-black text-[#808080] uppercase rounded-xl bg-transparent border border-[#808080] transition-colors active:text-white active:border-white audiowide-regular">Batal</button>
                <button id="m-back" onclick="backToStep1()" style="display:none;" class="flex-1 py-3 text-xs font-black text-[#facc15] uppercase rounded-xl bg-transparent border border-[#facc15] transition-colors active:text-white active:border-white audiowide-regular">Kembali</button>
                <button id="m-confirm" tabindex="-1" class="flex-1 py-3 text-[#666666] bg-transparent border border-[#666666] rounded-xl text-xs font-black uppercase transition-colors active:text-white active:border-white z-[2300] relative audiowide-regular">Oke</button>

    <div id="areaStruk" class="hidden"><div id="p-konten"></div></div>

    <script>
        const KEY = 'STORE_FAM_BARLA_V1_0';
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzPGJMBH1epQHAayVc5bHb8Q8gs9AW3pWuZrOplJccsuU4Dnh6C4sg_vB41ooyNFxjl/exec"; 

        let db = { supplier: [], retur: [], history: [] }; 
        let cart = []; let tempCloudHistory = [];
        let isScanning = false, html5QrCode = null, curTab = 'sup', selS = null, selB = null, openIdx = null, pendingIdxGrosir = null; 
        let isKasirGrosir = false, selKasirSup = null, activeReturType = null, activeReturItem = null, curDropdownOpen = null, activeDropdownCallback = null;
        let unuploadedData = false; 
        let lastBackupDate = ""; 
        let isProcessingCheckout = false; 
        let activeModalId = null;
        let currentMainMode = 'kasir';

        const ecerUnitList = ['pcs', 'renceng', 'botol', 'kg', 'bungkus', 'kaleng', 'sachet', 'strip'];
        const grosirUnitList = ['karton', 'lusin', 'slop', 'pack'];
        const printMap = { 'karton':'Krt', 'bungkus':'Bks', 'renceng':'Rcg', 'lusin':'Lsn', 'sachet':'Sch', 'strip':'Stp', 'botol':'Btl', 'slop':'Slp', 'pack':'Pck' };

        function getMinLimit(unit) { const u = (unit || '').toLowerCase(); const limits = { 'karton':2, 'lusin':1, 'slop':1, 'pack':3, 'renceng':5, 'botol':10, 'kg':5, 'bungkus':15, 'kaleng':10, 'pcs':10, 'strip':15, 'sachet':12 }; return limits[u] || 0; }

        window.onload = () => { 
            try { const data = localStorage.getItem(KEY); if (data) db = JSON.parse(data); if (!db.history) db.history = []; if(!db.retur) db.retur = []; 
                const savedCart = localStorage.getItem('BARLA_CART_' + KEY); if (savedCart) cart = JSON.parse(savedCart);
            } catch(e) { db = { supplier: [], retur: [], history: [] }; }
            
            if (localStorage.getItem('BARLA_UNSYNC') === '1') {
                unuploadedData = true;
                document.getElementById('sync-indicator').style.display = 'block';
            }

            html5QrCode = new Html5Qrcode("scanner-modal-layer"); refreshClock(); setInterval(refreshClock, 60000); refreshDL(); renderCart(); setupScannerEvents();
            navMode('kasir'); 
        };

        document.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter') { 
                if (activeModalId === 'b-modal' && document.getElementById('m-confirm').style.display !== 'none') { e.preventDefault(); document.getElementById('m-confirm').click(); }
                else if (activeModalId === 'modal-retur-step1') { e.preventDefault(); document.getElementById('btn-retur-confirm').click(); }
                else if (activeModalId === 'b-modal-isi-grosir') { e.preventDefault(); document.getElementById('ig-confirm').click(); }
                else if (activeModalId === 'modal-calendar') { e.preventDefault(); setCalendar(); }
            } 
        });
        document.addEventListener('click', (e) => { const sm = document.getElementById('floatingStokMenu'); if (sm && !sm.classList.contains('hidden') && !e.target.closest('[onclick*="toggleMenu"]') && !e.target.closest('#floatingStokMenu')) sm.classList.add('hidden'); if(curDropdownOpen && !e.target.closest(`#${curDropdownOpen.replace('dd', 'lb')}`) && !e.target.closest(`#${curDropdownOpen.replace('dd', 'btn')}`)) { document.getElementById(curDropdownOpen).classList.add('hidden'); curDropdownOpen = null; } });

        function toggleMenu(menuId) { document.getElementById(menuId).classList.toggle('hidden'); }
        function setupScannerEvents() { const kn = document.getElementById('k-nama'); const kq = document.getElementById('k-qty'); kn.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); handleInputNama(kn); setTimeout(() => { if (parseFloat(document.getElementById('k-harga').value.replace(/,/g, '.')) > 0) tambahItem(); else document.getElementById('k-harga').focus(); }, 100); } }); document.getElementById('k-harga').addEventListener('keypress', e => { if(e.key==='Enter') tambahItem(); }); kq.addEventListener('keypress', e => { if(e.key==='Enter') { e.preventDefault(); tambahItem(); } }); }
        function clearKasir() { document.getElementById('k-nama').value = ""; document.getElementById('k-harga').value = ""; document.getElementById('k-qty').value = ""; document.getElementById('k-qty').blur(); isKasirGrosir = false; selKasirSup = null; }
        function escapeHTML(str) { return str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : ""; }
        
        function autoKapital(el) {
            let val = el.value;
            if(!val) return;
            let start = el.selectionStart;
            let end = el.selectionEnd;
            let formatted = val.split(' ').map(w => /^(PVC|SNI|P\/C)$/i.test(w) ? w.toUpperCase() : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            if (el.value !== formatted) el.value = formatted;
            try { el.setSelectionRange(start, end); } catch(e){} 
        }

        function saveData(skipSyncFlag = false) { 
            try {
                localStorage.setItem(KEY, JSON.stringify(db)); 
                localStorage.setItem('BARLA_CART_' + KEY, JSON.stringify(cart)); 
                
                if (!skipSyncFlag) {
                    localStorage.setItem('BARLA_UNSYNC', '1');
                    unuploadedData = true; 
                    document.getElementById('sync-indicator').style.display = 'block'; 
                }

                refreshDL(); 
                if (!document.getElementById('section-stok').classList.contains('hidden')) renderStok(curTab); 
            } catch(e) {
                openModal("MEMORI PENUH", "", "Penyimpanan HP penuh! Tidak bisa menyimpan data baru. Segera hapus data HP Anda.", null, "alert");
            }
        }
        
        function formatRupiah(el) { let v = el.value.replace(/[^0-9]/g, ""); el.value = v ? new Intl.NumberFormat('id-ID').format(v) : ""; if (el.id === 'i-bayar') updateChange(); }
        function clean(s) { return parseInt((s||"").toString().split(',')[0].replace(/[^0-9]/g, "")) || 0; }
        
        let lastSyncAttempt = 0;
        function refreshClock() { 
            const now = new Date(); 
            document.getElementById('date-part').innerText = now.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});
            document.getElementById('time-part').innerText = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace(/\./g, ':'); 
            let currentDateStr = now.toLocaleDateString('id-ID');
            if (lastBackupDate !== currentDateStr) {
                lastBackupDate = currentDateStr; 
            }
            if (navigator.onLine && unuploadedData && (Date.now() - lastSyncAttempt > 60000)) {
                lastSyncAttempt = Date.now();
                uploadCloud(true);
            }
        }
        
        function getTglStr() { return new Date().toLocaleDateString('id-ID', {day: '2-digit', month: '2-digit', year: '2-digit'}).replace(/\//g, '.'); }
        function getJamStr() { return new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'}).replace(/\./g, ':'); }

        async function matikanKamera() { if (isScanning && html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} try { html5QrCode.clear(); } catch(e) {} isScanning = false; } document.getElementById('modal-kamera').style.display = 'none'; activeModalId = null; }
        
        async function bukaKameraPopup(target = 'auto') { if (isScanning) return; document.getElementById('modal-kamera').style.display = 'flex'; activeModalId = 'modal-kamera'; isScanning = true; try { await html5QrCode.start({ facingMode: "environment" }, { fps: 30 }, (decoded) => { const code = decoded.trim(); matikanKamera(); if (target === 'auto') { let f = null; let isG = false; let fSup = null; for (let s of db.supplier) { for (let b of s.barang) { if (b.bcE === code) { f = b; isG = false; fSup = s.nama; break; } if (b.bcG === code && code !== "") { f = b; isG = true; fSup = s.nama; break; } } if(f) break; } isKasirGrosir = isG; selKasirSup = fSup; if (f) { document.getElementById('k-nama').value = f.nama; document.getElementById('k-harga').value = (isG && f.hargaG > 0) ? f.hargaG.toLocaleString('id-ID') : f.hargaE.toLocaleString('id-ID'); document.getElementById('k-qty').value = 1; tambahItem(); } else openModal("TIDAK ADA", "", "Produk belum terdaftar.", null, "alert"); } else if (target === 'modal') document.getElementById('m-input').value = code; else { document.getElementById(target).value = code; } }); } catch (err) { matikanKamera(); } }
        
        function handleInputNama(el) { 
            autoKapital(el);
            let val = el.value.trim(); 
            if (!val) { document.getElementById('k-harga').value = ""; return; } 
            let f = null; let isG = false; let fSup = null; 
            for (let s of db.supplier) {
                for (let b of s.barang) {
                    if (b.nama.toUpperCase() === val.toUpperCase() || b.bcE === val) { f = b; isG = false; fSup = s.nama; break; } 
                    if (b.bcG === val && val !== "") { f = b; isG = true; fSup = s.nama; break; } 
                }
                if (f) break;
            }
            isKasirGrosir = isG; selKasirSup = fSup; 
            if (f) { 
                document.getElementById('k-nama').value = f.nama; 
                document.getElementById('k-harga').value = (isG && f.hargaG > 0) ? f.hargaG.toLocaleString('id-ID') : f.hargaE.toLocaleString('id-ID'); 
                document.getElementById('k-qty').value = 1; document.getElementById('k-qty').focus(); 
            } 
        }

        function refreshDL() { 
            const dl = document.getElementById('db-list'); dl.innerHTML = ""; 
            let limit = 0; 
            for (let s of db.supplier) { 
                for (let b of s.barang) { 
                    if (limit > 50) return; 
                    const inC = cart.find(x => x.nama.toUpperCase() === b.nama.toUpperCase() && x.sup === s.nama); 
                    if (b.stok > 0 && (!inC || inC.qty < b.stok)) { 
                        let o = document.createElement('option'); o.value = b.nama; o.innerText = `Sisa: ${formatStok(b.stok, b.isi, b.sK, b.sB)}`; dl.appendChild(o); limit++; 
                    } 
                } 
            } 
        }
        function formatStok(total, isi, sK, sB) { if (!sB || !isi || isi <= 1) return `${total} ${sK || 'satuan'}`; let besar = isi > 0 ? Math.floor(total / isi) : 0; let kecil = parseFloat((total % isi).toFixed(2)); let res = []; if (besar > 0) res.push(`${besar} ${sB}`); if (kecil > 0 || besar === 0) res.push(`${kecil} ${sK || 'satuan'}`); return res.join(' '); }

        function tambahItem() { 
            const n = document.getElementById('k-nama').value.trim(); 
            let qInputStr = document.getElementById('k-qty').value.replace(/,/g, '.');
            let qInput = Math.max(0, parseFloat(qInputStr)) || 1; 
            let pInput = clean(document.getElementById('k-harga').value); 
            
            if (!n || pInput <= 0 || isNaN(qInput) || qInput <= 0) { openModal("GAGAL", "", "Barang dan Harga harus diisi dengan benar!", null, "alert"); return; }
            
            let fb = null; let fbSup = null; 
            if (selKasirSup) { let s = db.supplier.find(x => x.nama === selKasirSup); if (s) { fb = s.barang.find(b => b.nama.toUpperCase() === n.toUpperCase()); fbSup = s; } } 
            if (!fb) { db.supplier.forEach(s => s.barang.forEach(b => { if (b.nama.toUpperCase() === n.toUpperCase()) { fb = b; fbSup = s; } })); } 
            if (!fb) { openModal("TIDAK ADA", "", "Barang tidak terdaftar!", null, "alert"); return; } 
            if (fb.stok <= 0) { openModal("KOSONG", "", "Barang tidak ada di stok!", null, "alert"); return; } 
            
            let actualQty = isKasirGrosir && fb.isi > 1 ? qInput * fb.isi : qInput; 
            let baseHargaE = fb.hargaE; let baseHargaG = fb.hargaG; 
            if (isKasirGrosir) { if (pInput !== fb.hargaG && pInput > 0) { baseHargaG = pInput; baseHargaE = fb.isi > 0 ? pInput / fb.isi : 0; } } 
            else { if (pInput !== fb.hargaE && pInput > 0) { baseHargaE = pInput; baseHargaG = fb.isi > 0 ? pInput * fb.isi : 0; } } 
            
            let inC = cart.find(x => x.nama.toUpperCase() === n.toUpperCase() && x.sup === fbSup.nama && x.hargaE === baseHargaE && x.hargaG === baseHargaG); 
            let totalInCart = cart.filter(x => x.nama.toUpperCase() === n.toUpperCase() && x.sup === fbSup.nama).reduce((sum, item) => sum + item.qty, 0); 
            
            if ((totalInCart + actualQty) > fb.stok) { openModal("KURANG", "", `Sisa stok: ${fb.stok}`, null, "alert"); return; } 
            
            if (inC) { inC.qty += actualQty; } 
            else { cart.push({ nama: n, sup: fbSup.nama, hargaE: baseHargaE, hargaG: baseHargaG, qty: actualQty, sK: fb.sK, sB: fb.sB, isi: fb.isi }); } 
            
            clearKasir(); saveData(); renderCart(); refreshDL(); 
        }
        
        function ubahQty(idx, delta) { 
            if(!cart[idx]) return; let it = cart[idx]; let ts = 0; let supObj = db.supplier.find(s => s.nama === it.sup); 
            if(supObj) { let b = supObj.barang.find(x => x.nama.toUpperCase() === it.nama.toUpperCase()); if(b) ts = b.stok; } 
            let currentTotalInCart = cart.filter((x, i) => i !== idx && x.nama.toUpperCase() === it.nama.toUpperCase() && x.sup === it.sup).reduce((sum, item) => sum + item.qty, 0); 
            if (it.qty + delta <= 0) cart.splice(idx, 1); 
            else if ((currentTotalInCart + it.qty + delta) > ts) { openModal("LIMIT", "", `Stok maksimal: ${ts}`, null, "alert"); return; } 
            else it.qty += delta; 
            saveData(); renderCart(); refreshDL(); 
        }

        function renderCart() { 
            const l = document.getElementById('list-cart'); l.innerHTML = ""; let tot = 0; 
            cart.forEach((k, i) => { 
                let sub = 0; let dTxt = ""; let hTxt = ""; 
                if (k.isi > 1 && k.sB && k.qty >= k.isi) { 
                    let b = Math.floor(k.qty / k.isi); let e = k.qty % k.isi; let hG = k.hargaG > 0 ? k.hargaG : (k.isi * k.hargaE); 
                    sub = (b * hG) + (e * k.hargaE); let dArr = []; 
                    if (b > 0) dArr.push(`${b} ${k.sB}`); if (e > 0) dArr.push(`${parseFloat(e.toFixed(2))} ${k.sK || 'satuan'}`); 
                    dTxt = dArr.join(' '); hTxt = `@ ${k.hargaG > 0 ? 'G:' + k.hargaG.toLocaleString('id-ID') : ''} ${k.hargaE > 0 ? 'S:' + k.hargaE.toLocaleString('id-ID') : ''}`; 
                } else { 
                    sub = k.qty * k.hargaE; dTxt = `${parseFloat(k.qty.toFixed(2))} ${k.sK || 'satuan'}`; hTxt = `@ Rp ${k.hargaE.toLocaleString('id-ID')}`; 
                } 
                tot += sub; 
                l.innerHTML += `<div class="bg-[#000000] p-3 rounded-xl flex items-center justify-between border border-[#666666] relative overflow-hidden"><div class="absolute left-0 top-0 bottom-0 w-1 bg-[#666666]"></div><div class="pl-2 flex-1"><h4 class="text-xs font-black text-[#ffffff] uppercase leading-tight mb-1">${escapeHTML(k.nama)}</h4><div class="flex items-center text-[10px] font-bold gap-2 mt-1"><div class="flex items-center bg-[#000000] border border-[#666666] rounded"><button onclick="ubahQty(${i},-1)" class="w-11 h-11 flex items-center justify-center text-[#808080] font-bold text-xl transition-colors active:text-white active:border-white">-</button><span onclick="promptQty(${i})" class="px-3 font-black text-[#ffffff] text-sm whitespace-nowrap transition-colors cursor-pointer">${dTxt}</span><button onclick="ubahQty(${i},1)" class="w-11 h-11 flex items-center justify-center text-[#808080] font-bold text-xl transition-colors active:text-white active:border-white">+</button></div><span class="text-[#808080]">${hTxt}</span></div></div><div class="text-right flex flex-col items-end gap-1"><span class="text-[#ffffff] font-black text-[13px]">${Math.round(sub).toLocaleString('id-ID')}</span><button onclick="cart.splice(${i},1);saveData();renderCart();" class="text-[#ff0000] text-[8px] uppercase font-black bg-transparent px-2 py-1 rounded border border-[#ff0000] transition-colors active:text-white active:border-white">Hapus</button></div></div>`; 
            }); 
            document.getElementById('t-total').innerText = "Rp " + Math.round(tot).toLocaleString('id-ID'); updateChange(); 
        }
        
        function promptQty(idx) { 
            let it = cart[idx]; let fb = null; let supObj = db.supplier.find(s => s.nama === it.sup); 
            if(supObj) fb = supObj.barang.find(b => b.nama.toUpperCase() === it.nama.toUpperCase()); 
            let currentTotalInCart = cart.filter((x, i) => i !== idx && x.nama.toUpperCase() === it.nama.toUpperCase() && x.sup === it.sup).reduce((sum, item) => sum + item.qty, 0); 
            if (fb && fb.sB && fb.isi > 1) { 
                openModal("EDIT QTY", it.qty, it.nama, (v) => { 
                    let nQ = Math.max(0, parseFloat(v)) || 0; 
                    if (nQ === 0) cart.splice(idx, 1); 
                    else { if ((currentTotalInCart + nQ) > fb.stok) { openModal("KURANG", "", `Sisa yg bisa ditambah: ${fb.stok - currentTotalInCart}`, null, "alert"); return; } it.qty = nQ; } 
                    saveData(); renderCart(); refreshDL(); 
                }, "dual_edit_stok", "numeric", {sK: fb.sK, sB: fb.sB, stok: it.qty, isi: fb.isi}); 
            } else { 
                openModal("EDIT QTY", it.qty.toString(), it.nama, (v) => { 
                    let nQ = Math.max(0, parseFloat(String(v).replace(/,/g, '.'))) || 0; 
                    if (nQ === 0) cart.splice(idx, 1); 
                    else { if ((currentTotalInCart + nQ) > fb.stok) { openModal("KURANG", "", `Sisa yg bisa ditambah: ${fb.stok - currentTotalInCart}`, null, "alert"); return; } it.qty = nQ; } 
                    saveData(); renderCart(); refreshDL(); 
                }, "prompt", "numeric"); 
            }

        async function uploadCloud(silent = false) { 
            if(!silent) openModal("UPLOADING", "", "Mengirim data ke Cloud...", null, "cloud"); 
            try { 
                const payload = {
                    supplier: db.supplier,
                    retur: db.retur.filter(r => !r.isUploaded),
                    history: db.history.filter(h => !h.isUploaded)
                };
                const res = await fetch(CLOUD_URL, { method: 'POST', redirect: "follow", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) }); 
                if(res.ok) { 
                    const resText = await res.text(); 
                    if(!resText.includes("Error") && !resText.includes("<html")) { 
                        db.history.forEach(h => h.isUploaded = true);
                        db.retur.forEach(r => r.isUploaded = true);
                        
                        unuploadedData = false; 
                        saveData(true); 
                        localStorage.removeItem('BARLA_UNSYNC'); 
                        document.getElementById('sync-indicator').style.display = 'none'; 
                        
                        if(!silent) openModal("SUKSES", "", "Upload berhasil!", null, "alert"); 
                    } else throw new Error(); 
                } else throw new Error(); 
            } catch(e) { 
                if(!silent) openModal("GAGAL", "", "Gagal kirim data ke Cloud.", null, "alert"); 
            } 
        }

                const data = await res.json(); 
                if(data && data.supplier) { 
                    let savedHistory = db.history || []; let savedRetur = db.retur || []; 
                    db = data; db.history = savedHistory; db.retur = savedRetur.length > 0 ? savedRetur : (data.retur || []); 
                    
                    unuploadedData = false; 
                    saveData(true);
                    localStorage.removeItem('BARLA_UNSYNC');
                    document.getElementById('sync-indicator').style.display = 'none'; 
                    
                    openModal("SUKSES", "", "LOAD BERHASIL!", () => { renderStok(curTab); refreshDL(); }, "alert"); 
                } 
            } catch(e) { 
                openModal("GAGAL", "", "Gagal ambil data.", null, "alert"); 
            } 
        }

            sbx.style.borderColor = bc; 
            bok.style.display = mode==='cloud' ? "none" : "block"; 
            bok.className = `flex-1 py-3 bg-transparent rounded-xl text-xs font-black uppercase transition-colors active:text-white active:border-white border audiowide-regular`; 
            
            if (btnBatal.style.display === 'block') { btnBatal.style.borderColor = bc; btnBatal.style.color = bc; bok.style.borderColor = "#666666"; bok.style.color = "#808080"; } 
            else { bok.style.borderColor = bc; bok.style.color = bc; }
            
            if(mode === 'danger_confirm') { btnBatal.style.display = 'block'; btnBatal.className = "flex-1 py-3 bg-transparent border rounded-xl text-xs font-black uppercase transition-colors active:text-white active:border-white audiowide-regular"; btnBatal.style.borderColor = "#ff0000"; btnBatal.style.color = "#ff0000"; bok.style.borderColor = "#666666"; bok.style.color = "#808080"; } 
            
            if(document.getElementById('m-lb-ecer')) document.getElementById('m-lb-ecer').onclick = null; 
            if(document.getElementById('m-lb-grosir')) document.getElementById('m-lb-grosir').onclick = null; 
            if(document.getElementById('m-dd-ecer')) document.getElementById('m-dd-ecer').classList.add('hidden'); 
            if(document.getElementById('m-dd-grosir')) document.getElementById('m-dd-grosir').classList.add('hidden'); 
            
            if ((mode === 'dual' || mode === 'dual_edit_stok') && brObj) { 
                let isRetur = t.includes("RETUR");
                let bCls = `m-dual-wrapper border-[#666666]`; 
                document.getElementById('m-dw-ecer').className = bCls; document.getElementById('m-dw-grosir').className = bCls;
                document.getElementById('m-dw-ecer').style.borderColor = bc; document.getElementById('m-dw-grosir').style.borderColor = bc;
                
                let lKecil = document.getElementById('m-label-kecil'); 
                lKecil.innerHTML = (brObj.sK || 'SATUAN').toUpperCase() + (mode==='dual_edit_stok' && !isRetur ? ' <i class="fas fa-caret-down text-[8px] ml-1"></i>' : ''); 
                document.getElementById('m-lb-ecer').style.borderLeftColor = bc; lKecil.style.color = "#ffffff";
                
                if(mode === 'dual_edit_stok') { 
                    activeDropdownCallback = (tipe, val) => { if(tipe==='ecer') brObj.sK = val; else brObj.sB = val; }; 
                    if (!isRetur) setupDropdown('m-lb-ecer', 'm-dd-ecer', 'ecer', brObj); 
                    else document.getElementById('m-lb-ecer').onclick = null;
                } 
                
                document.getElementById('m-input-kecil').value = isWipe ? "" : (t.includes("HARGA") ? (brObj.hargaE ? brObj.hargaE.toLocaleString('id-ID') : "") : parseFloat((brObj.stok % brObj.isi).toFixed(2))); 
                
                if (brObj.sB && (brObj.isi > 0 || t.includes("HARGA") || t.includes("RETUR"))) { 
                    document.getElementById('m-dw-grosir').style.display = 'flex'; 
                    let lBesar = document.getElementById('m-label-besar'); 
                    lBesar.innerHTML = brObj.sB.toUpperCase() + (mode==='dual_edit_stok' && !isRetur ? ' <i class="fas fa-caret-down text-[8px] ml-1"></i>' : ''); 
                    document.getElementById('m-lb-grosir').style.borderLeftColor = bc; lBesar.style.color = "#ffffff";
                    
                    if(mode === 'dual_edit_stok') {
                        if (!isRetur) setupDropdown('m-lb-grosir', 'm-dd-grosir', 'grosir', brObj); 
                        else document.getElementById('m-lb-grosir').onclick = null;
                    }
                    document.getElementById('m-input-besar').value = isWipe ? "" : (t.includes("HARGA") ? (brObj.hargaG ? brObj.hargaG.toLocaleString('id-ID') : "") : Math.floor(brObj.stok / brObj.isi)); 
                } else { 
                    document.getElementById('m-dw-grosir').style.display = 'none'; 
                    if(!t.includes("HARGA")) document.getElementById('m-input-kecil').value = isWipe ? "" : brObj.stok; 
                } 
            } else if (mode === 'barcode_dual' && brObj) { 
                document.getElementById('mb-input-kecil').value = brObj.bcE || ""; document.getElementById('mb-input-besar').value = brObj.bcG || ""; 
            } else { inp.value = v; inp.inputMode = type==="numeric"?"numeric":"text"; } 
            
            if (mode === 'prompt' && (t.includes("NAMA") || t.includes("SUPPLIER"))) {
                inp.oninput = () => autoKapital(inp);
            } else {
                inp.oninput = null;
            }

            bok.onclick = () => { 
                let res = null;
                if ((mode === 'dual' || mode === 'dual_edit_stok') && !t.includes("HARGA")) { let bVal = Math.max(0, parseFloat(document.getElementById('m-input-besar').value.replace(/,/g, '.')) || 0); let kVal = Math.max(0, parseFloat(document.getElementById('m-input-kecil').value.replace(/,/g, '.')) || 0); res = (bVal * (brObj.isi || 0)) + kVal; } 
                else if (mode === 'dual' || mode === 'dual_edit_stok') { res = { val1: t.includes("HARGA") ? Math.max(0, clean(document.getElementById('m-input-kecil').value)) : document.getElementById('m-input-kecil').value, val2: t.includes("HARGA") ? Math.max(0, clean(document.getElementById('m-input-besar').value)) : document.getElementById('m-input-besar').value }; } 
                else if (mode === 'barcode_dual') res = { val1: document.getElementById('mb-input-kecil').value, val2: document.getElementById('mb-input-besar').value }; 
                else res = inp.value; 
                if (typeof cb === 'function') cb(res); closeModal(); 
            }; 
            m.style.display = 'flex'; activeModalId = 'b-modal'; if(mode==='prompt') setTimeout(()=>inp.focus(),300); 
        }
        function closeModal() { document.getElementById('b-modal').style.display = 'none'; activeModalId = null; }

        let calDate = new Date(); let selDate = new Date(); let calTargetInput = null;
        function openCalendar(inputId) {
            calTargetInput = document.getElementById(inputId);
            if (calTargetInput.value) {
                let parts = calTargetInput.value.split('-'); 
                selDate = new Date(parts[0], parts[1]-1, parts[2]);
                calDate = new Date(selDate);
            } else { selDate = new Date(); calDate = new Date(); }
            renderCalendar();
            document.getElementById('modal-calendar').style.display = 'flex';
            activeModalId = 'modal-calendar';
        }
        function closeCalendar() { document.getElementById('modal-calendar').style.display = 'none'; activeModalId = null; }
        function setCalendar() {
            if (calTargetInput) {
                let y = selDate.getFullYear();
                let m = String(selDate.getMonth() + 1).padStart(2, '0');
                let d = String(selDate.getDate()).padStart(2, '0');
                calTargetInput.value = `${y}-${m}-${d}`;
            }
            closeCalendar();
        }
        function changeMonth(delta) { calDate.setMonth(calDate.getMonth() + delta); renderCalendar(); }
        function selectDate(y, m, d) { selDate = new Date(y, m, d); renderCalendar(); }
        function renderCalendar() {
            const year = calDate.getFullYear(); const month = calDate.getMonth(); const today = new Date();
            const days = ['Ming', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
            const monthsShort = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            const monthsFull = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            document.getElementById('cal-year').innerText = selDate.getFullYear();
            document.getElementById('cal-date-display').innerText = `${days[selDate.getDay()]}, ${selDate.getDate()} ${monthsShort[selDate.getMonth()]}`;
            document.getElementById('cal-month-year').innerText = `${monthsFull[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
            
            for (let i = 0; i < firstDay; i++) { grid.innerHTML += `<div></div>`; }
            for (let i = 1; i <= daysInMonth; i++) {
                let isToday = (i === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                let isSelected = (i === selDate.getDate() && month === selDate.getMonth() && year === selDate.getFullYear());
                let cls = "w-8 h-8 flex items-center justify-center rounded-full mx-auto cursor-pointer transition-colors ";
                if (isSelected) cls += "bg-[#ff0000] text-[#ffffff] shadow-[0_0_10px_rgba(255,0,0,0.5)]";
                else if (isToday) cls += "border border-[#ff0000] text-[#ff0000]";
                else cls += "text-[#ffffff] active:bg-[#333333]";
                grid.innerHTML += `<div onclick="selectDate(${year}, ${month}, ${i})" class="${cls}">${i}</div>`;
            }
        }
        
        function exportData() { let ds = []; db.supplier.forEach(s=>s.barang.forEach(b=>ds.push({"Supplier":s.nama,"Barang":b.nama,"BC Satuan":b.bcE||"","BC Grosir":b.bcG||"","Harga Satuan":b.hargaE||0,"Harga Grosir":b.hargaG||0,"Stok":b.stok,"Satuan":b.sK||'pcs',"Grosir":b.sB||'',"Isi":b.isi||0,"Batas Laporan":getMinLimit(b.sB||b.sK)}))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ds), "Stok"); XLSX.writeFile(wb, "DATA_STORE_FAM_BARLA.xlsx"); }
        function importData(inp) { if(!inp.files[0]) return; const r = new FileReader(); r.readAsArrayBuffer(inp.files[0]); r.onload = (e) => { try { const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'}); const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); json.forEach(row => { const sn = (row["Supplier"]||"").toString().trim(), bn = (row["Barang"]||"").toString().trim(); if(sn && bn) { let s = db.supplier.find(x=>x.nama.toLowerCase()===sn.toLowerCase()) || {nama:sn, barang:[]}; if(!db.supplier.includes(s)) db.supplier.unshift(s); let b = s.barang.find(x=>x.nama.toLowerCase()===bn.toLowerCase()); if(b) { b.stok = parseFloat((row["Stok"]||0).toString().replace(/,/g, '.'))||0; b.hargaE = parseInt((row["Harga Satuan"]||0).toString().split(',')[0].replace(/[^0-9]/g, ''))||0; b.hargaG = parseInt((row["Harga Grosir"]||0).toString().split(',')[0].replace(/[^0-9]/g, ''))||0; b.bcE = (row["BC Satuan"]||'').toString().trim(); b.bcG = (row["BC Grosir"]||'').toString().trim(); b.sK = (row["Satuan"]||'pcs').toString().toLowerCase().trim(); b.sB = (row["Grosir"]||'').toString().toLowerCase().trim(); b.isi = Math.abs(parseInt(row["Isi"]))||0; } else { s.barang.unshift({nama:bn, bcE:(row["BC Satuan"]||"").toString().trim(), bcG:(row["BC Grosir"]||"").toString().trim(), hargaE:parseInt((row["Harga Satuan"]||0).toString().split(',')[0].replace(/[^0-9]/g, ''))||0, hargaG:parseInt((row["Harga Grosir"]||0).toString().split(',')[0].replace(/[^0-9]/g, ''))||0, stok:parseFloat((row["Stok"]||0).toString().replace(/,/g, '.'))||0, sK:(row["Satuan"]||'pcs').toString().toLowerCase().trim(), sB:(row["Grosir"]||'').toString().toLowerCase().trim(), isi:Math.abs(parseInt(row["Isi"]))||0}); } } }); saveData(); renderStok(curTab); } catch(err) { openModal("ERROR","","Format salah!",null,"alert"); } }; }
        function printReturSemua() { let h = `          STORE famBARLA         \n     Ps. Sunggingan Lt. 2      \n-------------------------------\nREKAP RETUR - ${getTglStr()}\n-------------------------------\n`; const g = db.retur.reduce((a,r)=>{(a[r.sup]=a[r.sup]||[]);a[r.sup].push(r);return a;},{}); for(let s in g){ h += `• ${escapeHTML(s).toUpperCase()}\n`; g[s].forEach(r=> h += `  ${escapeHTML(r.nama).substring(0,18).padEnd(19)} ${r.type==='in'?'+':'-'}${escapeHTML(r.qtyStr)}\n`); h += `\n`; } document.getElementById('p-konten').innerHTML = `<pre>${h}</pre>`; window.print(); }
        function printReturSup(sn) { let h = `          STORE famBARLA         \n     Ps. Sunggingan Lt. 2      \n-------------------------------\nRETUR: ${escapeHTML(sn).toUpperCase()}\n-------------------------------\n`; db.retur.filter(x=>x.sup===sn).forEach(r=> h += `${escapeHTML(r.nama).substring(0,18).padEnd(19)} ${r.type==='in'?'+':'-'}${escapeHTML(r.qtyStr)}\n`); document.getElementById('p-konten').innerHTML = `<pre>${h}</pre>`; window.print(); }
        function printLapSemua() { let h = `          STORE famBARLA         \n     Ps. Sunggingan Lt. 2      \n-------------------------------\nLAPORAN STOK - ${getTglStr()}\n-------------------------------\n`; db.supplier.forEach(s=>{ const k=s.barang.filter(b=>{ if(b.sB && b.isi > 0) { let krt = Math.floor(b.stok / b.isi); return krt <= getMinLimit(b.sB); } else { return b.stok <= getMinLimit(b.sK); }}); if(k.length>0){ h += `• ${escapeHTML(s.nama).toUpperCase()}\n`; k.forEach(b=> h += `  ${escapeHTML(b.nama).substring(0,18).padEnd(19)} ${formatStok(b.stok, b.isi, b.sK, b.sB)}\n`); h += `\n`; } }); document.getElementById('p-konten').innerHTML=`<pre>${h}</pre>`; window.print(); }
        function waR(sn) { let h = `*RETUR famBARLA*\nSupplier: ${sn}\n-------------------\n`; db.retur.filter(x=>x.sup===sn).forEach(r=> h += `• ${r.nama}: ${r.type==='in'?'+':'-'}${r.qtyStr}\n`); window.open(`https://wa.me/?text=${encodeURIComponent(h)}`); }
        function waO(i) { let s=db.supplier[i], h = `*ORDER famBARLA*\nSupplier: ${s.nama}\n-------------------\n`; s.barang.filter(b=>{ if(b.sB && b.isi > 0) { let krt = Math.floor(b.stok / b.isi); return krt <= getMinLimit(b.sB); } else { return b.stok <= getMinLimit(b.sK); }}).forEach(b=> h += `• ${b.nama}: (Sisa ${formatStok(b.stok, b.isi, b.sK, b.sB)})\n`); window.open(`https://wa.me/?text=${encodeURIComponent(h)}`); }
        function trHR(sn) { openModal("HAPUS?", "", `Hapus data retur ${sn}?`, () => { db.retur=db.retur.filter(x=>x.sup!==sn); saveData(); renderStok('retur'); }, "confirm"); }
        
        window.addEventListener('online', () => { if (unuploadedData && (Date.now() - lastSyncAttempt > 60000)) lastSyncAttempt = Date.now(); });
    </script>

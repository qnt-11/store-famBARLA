<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#131314">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BARLA KASIR">
    <title>BARLA STORE v18.0 PREMIUM</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --gemini-bg: #131314; --gemini-grey: #1e1f22; }
        body { font-family: "Segoe UI", sans-serif; background: var(--gemini-bg); color: #ffffff; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* CSS KHUSUS PRINT SUPER KAKU ANTI-BERANTAKAN */
        @media print {
            @page { margin: 0; size: auto; }
            body { background: white; margin: 0; padding: 0; }
            body * { display: none !important; }
            #areaStruk, #areaStruk * { display: block !important; visibility: visible !important; }
            #areaStruk { position: absolute; left: 0; top: 0; color: #000; background: white; width: 100%; margin: 0; padding: 0; }
            pre { font-family: 'Courier New', Courier, monospace !important; white-space: pre !important; font-size: 10pt !important; line-height: 1.2 !important; margin: 0; padding: 0; overflow: visible !important; }
        }
        
        .tab-active { background: #2b2d31; color: white !important; }
        .sheet-bg { background: rgba(0, 0, 0, 0.85); z-index: 1000; position: fixed; inset: 0; display: none; align-items: flex-end; }
        .sheet-content { background: var(--gemini-grey); width: 100%; border-radius: 2rem 2rem 0 0; padding: 2rem; transform: translateY(100%); transition: transform 0.3s; }
        .sheet-active .sheet-content { transform: translateY(0); }
        .modal-bg { background: rgba(0, 0, 0, 0.9); z-index: 1200; position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 20px; }
        .nav-btn { transition: all 0.2s; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: transparent; border: none; }
        .nav-btn i { font-size: 15px; color: #6b7280; transition: color 0.2s; } 
        .nav-btn span { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #6b7280; } 
        .active-nav { background: transparent !important; border: none !important; }
        .active-nav i { color: #ffffff !important; }
        .active-nav span { color: #6b7280 !important; }
        .premium-scan { border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .premium-scan::before { content: ""; width: 80%; height: 2px; background: #ff0000; position: absolute; box-shadow: 0 0 8px #ff0000; animation: laser 1.5s infinite ease-in-out; z-index: 10; }
        @keyframes laser { 0%, 100% { top: 20%; } 50% { top: 75%; } }
        #qr-shaded-region { display: none !important; }
        #scanner-modal-layer video { object-fit: cover !important; }
        input { background-color: var(--gemini-bg) !important; color: #ffffff !important; border: 1px solid #4b5563 !important; }
        input::placeholder { color: #94a3b8 !important; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-[#131314] p-3 text-white shadow-md sticky top-0 z-50 flex justify-between items-center no-print border-b border-[#2b2d31]">
        <div>
            <h1 class="text-base font-black italic uppercase leading-none text-white">BARLA STORE</h1>
            <p id="h-time" class="text-[8px] mt-1 uppercase"></p>
        </div>
        <div class="flex items-center gap-4">
            <div id="h-kasir" class="flex gap-4 items-center">
                <button onclick="bukaHistory()" class="active:scale-75 transition"><i class="fas fa-history text-[18px] text-white"></i></button>
                <button onclick="bukaKameraPopup('auto')" class="active:scale-75 transition"><div class="premium-scan w-7 h-7 border-2 border-white"></div></button>
            </div>
            
            <div id="h-stok" class="hidden flex items-center gap-3">
                <button onclick="uploadCloud()" class="flex flex-col items-center text-sky-400 active:scale-75 transition mt-0.5">
                    <i class="fas fa-cloud-upload-alt text-lg"></i>
                    <span class="text-[7px] font-bold mt-0.5 uppercase text-white">UPLOAD</span>
                </button>

                <div class="relative flex items-center h-full">
                    <button onclick="toggleMenu('floatingStokMenu')" class="text-white active:scale-75 transition px-2 py-1">
                        <i class="fas fa-ellipsis-v text-sm"></i>
                    </button>

                    <div id="floatingStokMenu" class="hidden absolute right-0 top-full mt-3 w-40 p-2 bg-[#1e1f22] border border-[#2b2d31] rounded-xl shadow-2xl z-[60] space-y-1.5">
                        <button onclick="toggleMenu('floatingStokMenu'); downloadCloud();" class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg border border-sky-400 text-white hover:bg-[#2b2d31] transition">
                            <i class="fas fa-cloud-download-alt text-base text-sky-400 w-5 text-center"></i>
                            <span class="text-[10px] font-bold uppercase tracking-wide">Load Cloud</span>
                        </button>
                        <div class="border-t border-[#2b2d31] my-1"></div>
                        <button onclick="toggleMenu('floatingStokMenu'); exportData();" class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg border border-[#217346] text-[#217346] hover:bg-[#2b2d31] transition">
                            <i class="fas fa-file-export text-base w-5 text-center"></i>
                            <span class="text-[10px] font-bold uppercase tracking-wide">Save Excel</span>
                        </button>
                        <button onclick="toggleMenu('floatingStokMenu'); document.getElementById('fIn').click();" class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg border border-[#217346] text-[#217346] hover:bg-[#2b2d31] transition">
                            <i class="fas fa-file-import text-base w-5 text-center"></i>
                            <span class="text-[10px] font-bold uppercase tracking-wide">Load Excel</span>
                        </button>
                        <input type="file" id="fIn" class="hidden" accept=".csv, .xlsx, .xls" onchange="importData(this)">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="modal-kamera" class="modal-bg z-[1400]">
        <div class="bg-[#1e1f22] w-full max-w-sm rounded-3xl p-4 shadow-2xl relative border border-[#2b2d31]">
            <div id="scanner-modal-layer" class="w-full h-72 bg-black rounded-2xl overflow-hidden border-4 border-[#2b2d31]"></div>
            <button onclick="matikanKamera()" class="w-full bg-[#ff0000] text-white font-black py-4 mt-3 rounded-2xl uppercase text-sm italic active:scale-95 transition">Tutup Scanner</button>
        </div>
    </div>

    <main class="max-w-md mx-auto p-2 no-print bg-[#131314]" id="m-content">
        <div id="section-kasir" class="pb-48 pt-1 bg-[#131314]"> 
            <div class="bg-[#1e1f22] p-3 rounded-xl shadow-sm border border-[#2b2d31] mb-2">
                <div class="flex gap-2 mb-2">
                    <div class="relative flex-1">
                        <input type="text" id="k-nama" list="db-list" oninput="handleInputNama(this)" placeholder="Nama Barang" class="w-full pl-3 pr-9 py-2 rounded-lg font-bold text-xs outline-none transition-all">
                        <button onclick="clearKasir()" class="absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 flex justify-center items-center text-[#ff0000] rounded-full transition z-10"><i class="fas fa-times text-sm"></i></button>
                        <datalist id="db-list"></datalist>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="relative w-2/5"><span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-[9px] font-black text-white z-10">Rp</span><input type="text" id="k-harga" inputmode="numeric" oninput="formatRupiah(this)" placeholder="Harga" class="w-full pl-7 pr-2 py-2 rounded-lg font-bold text-xs outline-none transition-all"></div>
                    <input type="number" id="k-qty" inputmode="numeric" placeholder="Qty" class="w-1/5 px-1 py-2 rounded-lg font-bold text-xs text-center outline-none transition-all">
                    <button onclick="tambahItem()" class="w-2/5 bg-[#3b82f6] hover:opacity-80 text-white font-bold text-xs rounded-lg shadow-sm active:scale-95 transition flex items-center justify-center gap-1"><i class="fas fa-plus"></i> ADD</button>
                </div>
            </div>
            
            <div id="list-cart" class="space-y-1.5 bg-[#131314]"></div>
            
            <div id="p-bayar" class="fixed bottom-[48px] left-0 w-full bg-[#131314] px-4 py-3 shadow-[0_-4px_15px_rgba(0,0,0,0.8)] border-t border-[#2b2d31] z-30">
                <div class="flex justify-between items-center mb-2 gap-3 max-w-md mx-auto">
                    <div class="flex flex-col"><span class="text-[9px] font-black text-white uppercase tracking-wide">Total</span><span id="t-total" class="text-2xl font-black text-[#ff0000] leading-none tracking-tighter">Rp 0</span></div>
                    <div class="w-1/2"><input type="text" id="i-bayar" inputmode="numeric" oninput="formatRupiah(this)" placeholder="Bayar" class="w-full text-right text-base font-black px-3 py-1.5 rounded-lg outline-none"></div>
                </div>
                <div class="max-w-md mx-auto">
                    <div id="b-kembali" class="hidden flex justify-between items-center bg-[#131314] border border-[#4b5563] rounded-lg p-1.5 px-3 mb-2 transition-all"><span class="text-[10px] font-bold text-white uppercase">Kembalian</span><span id="t-kembali" class="text-sm font-black">Rp 0</span></div>
                    <div class="flex gap-2">
                        <button onclick="checkout('wa')" class="flex-1 bg-[#1e1f22] border border-[#25D366] text-[#25D366] font-bold py-2.5 rounded-lg shadow-sm uppercase text-[11px] active:scale-95 transition flex justify-center items-center gap-1.5"><i class="fab fa-whatsapp text-sm"></i> WhatsApp</button>
                        <button onclick="checkout('print')" class="flex-1 bg-[#1e1f22] border border-[#3b82f6] text-[#3b82f6] font-bold py-2.5 rounded-lg shadow-sm uppercase text-[11px] active:scale-95 transition flex justify-center items-center gap-1.5"><i class="fas fa-print text-sm"></i> Cetak</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-stok" class="hidden space-y-4">
            <div id="stok-tabs-container" class="flex bg-[#1e1f22] rounded-xl shadow-sm p-1 border border-[#2b2d31] mb-4 mt-1 items-center">
                <button onclick="toggleStokSearch(true)" id="btn-stok-search" class="px-3 text-[#6b7280] active:scale-90 transition"><i class="fas fa-search text-sm"></i></button>
                <div id="stok-tabs" class="flex flex-1 gap-1">
                    <button onclick="tab('sup')" id="b-sup" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg tab-active transition text-white">Supplier</button>
                    <button onclick="tab('retur')" id="b-retur" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition text-white">Retur</button>
                    <button onclick="tab('lap')" id="b-lap" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition text-white">Laporan</button>
                </div>
                <div id="stok-search-box" class="hidden flex-1 relative items-center">
                    <input type="text" id="i-stok-search" oninput="renderStok(curTab)" placeholder="Cari..." class="w-full py-2 pl-3 pr-8 rounded-lg font-bold text-xs outline-none bg-transparent text-white border-none focus:ring-0">
                    <button onclick="toggleStokSearch(false)" class="absolute right-2 top-1/2 -translate-y-1/2 text-[#ff0000] font-black text-sm p-1"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="stok-content" class="space-y-3 pb-20"></div>
            <button onclick="openModalSup()" id="fab" class="fixed right-5 bottom-16 w-12 h-12 bg-[#3b82f6] text-white rounded-xl shadow-lg flex items-center justify-center text-lg z-40 active:scale-90 transition border border-[#3b82f6]"><i class="fas fa-plus"></i></button>
        </div>
    </main>

    <div id="modal-history" class="modal-bg">
        <div class="bg-[#1e1f22] w-full max-w-sm rounded-3xl p-5 shadow-2xl flex flex-col border border-[#2b2d31]" style="max-height: 80vh;">
            <div class="flex justify-between items-center mb-3 border-b border-[#2b2d31] pb-2"><h3 class="font-black text-[#3b82f6] text-lg uppercase italic"><i class="fas fa-history mr-2"></i>Riwayat Jual</h3><button onclick="tutupHistory()" class="text-[#ff0000] font-bold text-2xl leading-none">&times;</button></div>
            <div id="history-content" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            <button onclick="hapusHistory()" class="mt-3 w-full py-3 bg-[#2b2d31] border border-[#ff0000] text-[#ff0000] rounded-xl text-xs font-black uppercase transition-all">Bersihkan Riwayat</button>
        </div>
    </div>

    <div id="a-sheet" class="sheet-bg" onclick="closeSheet(event)"><div class="sheet-content border-t border-[#2b2d31]"><div id="sheet-opts" class="grid gap-3"></div></div></div>
    
    <div id="b-modal" class="modal-bg z-[1300]">
        <div class="bg-[#1e1f22] w-full max-w-xs rounded-3xl p-6 shadow-2xl space-y-4 border-t-[8px]" id="m-border">
            <h3 id="m-title" class="font-black text-white text-center uppercase text-lg italic"></h3>
            <p id="m-desc" class="text-[11px] text-white font-bold text-center uppercase whitespace-pre-wrap"></p>
            <div id="m-input-box" style="display:none;" class="flex gap-2 items-center rounded-2xl border-2 overflow-hidden">
                <input type="text" id="m-input" oninput="handleModalInput(this)" class="flex-1 w-0 p-3 bg-transparent border-none text-center text-xl font-black outline-none text-white">
                <button id="m-scan-btn" style="display:none;" class="w-12 h-12 shrink-0 bg-transparent flex items-center justify-center active:scale-90 transition pr-2"><div class="premium-scan w-8 h-8 border border-white rounded-md"></div></button>
            </div>
            <div class="flex gap-2 pt-1">
                <button id="m-cancel" onclick="closeModal()" style="display:none;" class="flex-1 py-3 text-xs font-black text-white uppercase rounded-xl hover:bg-[#2b2d31] transition">Batal</button>
                <button id="m-confirm" class="flex-1 py-3 text-white rounded-xl text-xs font-black shadow-sm uppercase active:scale-95 transition">Oke</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#131314] border-t border-[#2b2d31] flex justify-around no-print z-50">
        <button onclick="navMode('kasir')" id="n-k" class="nav-btn active-nav"><i class="fas fa-store"></i><span>Kasir</span></button>
        <button onclick="navMode('stok')" id="n-s" class="nav-btn"><i class="fas fa-box-open"></i><span>Stok</span></button>
    </nav>
    <div id="areaStruk" class="hidden"><div id="p-konten"></div></div>

    <script>
        const KEY = 'BARLA_ULTRA_V18_0';
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycby43-uejqHJ5e2oFc2xO3vmvltAxQKSD3z3plOhK3CBmNbw_dDRNNYmSsSIhpbAg3NA/exec"; 

        let db = { supplier: [], retur: [], history: [] }; 
        let cart = []; 
        let isScanning = false, html5QrCode = null, curTab = 'sup', selS = null, selB = null, openIdx = null;

        window.onload = () => { 
            try {
                const data = localStorage.getItem(KEY); 
                if (data) db = JSON.parse(data);
                if (!db.history) db.history = [];
                const savedCart = localStorage.getItem('BARLA_CART');
                if (savedCart) cart = JSON.parse(savedCart);
            } catch(e) { db = { supplier: [], retur: [], history: [] }; }
            html5QrCode = new Html5Qrcode("scanner-modal-layer");
            refreshClock(); setInterval(refreshClock, 60000); refreshDL(); renderCart();
            setupScannerEvents();
            
            let savedMode = localStorage.getItem('BARLA_LAST_MODE') || 'kasir';
            let savedTab = localStorage.getItem('BARLA_LAST_TAB') || 'sup';
            curTab = savedTab;
            mode(savedMode);
            if(savedMode !== 'stok') renderStok(curTab);
        };

        function toggleMenu(menuId) {
            document.getElementById(menuId).classList.toggle('hidden');
        }

        document.addEventListener('click', (e) => {
            const stokMenu = document.getElementById('floatingStokMenu');
            if (stokMenu && !stokMenu.classList.contains('hidden') && 
                !e.target.closest('[onclick*="toggleMenu(\'floatingStokMenu\')"]') && 
                !e.target.closest('#floatingStokMenu')) {
                stokMenu.classList.add('hidden');
            }
        });

        async function uploadCloud() {
            openModal("UPLOADING", "", "Menyimpan data ke Cloud...", null, "alert");
            try {
                const res = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify(db), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
                const result = await res.json();
                if(result.status === 'success') openModal("SUKSES", "", "BACKUP KE GOOGLE SHEETS!", () => {}, "alert");
                else throw new Error();
            } catch(e) { openModal("GAGAL", "", "Koneksi ke Google Sheets gagal.", null, "alert"); }
        }

        async function downloadCloud() {
            openModal("DOWNLOADING", "", "Mengambil data dari Cloud...", null, "alert");
            try {
                const res = await fetch(CLOUD_URL);
                const data = await res.json();
                if(data && data.supplier) { 
                    db = data; saveData(); 
                    openModal("SUKSES", "", "LOAD DARI GOOGLE SHEETS!", () => { renderStok(curTab); refreshDL(); }, "alert"); 
                }
                else openModal("GAGAL", "", "Data Cloud kosong.", null, "alert");
            } catch(e) { openModal("GAGAL", "", "Gagal mengambil data.", null, "alert"); }
        }

        function setupScannerEvents() {
            const kNama = document.getElementById('k-nama');
            kNama.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); handleInputNama(this);
                    setTimeout(() => { if (clean(document.getElementById('k-harga').value) > 0) tambahItem(); else document.getElementById('k-harga').focus(); }, 100);
                }
            });
            document.getElementById('k-harga').addEventListener('keypress', e => { if(e.key==='Enter') tambahItem(); });
            document.getElementById('k-qty').addEventListener('keypress', e => { if(e.key==='Enter') tambahItem(); });
        }

        function clearKasir() { document.getElementById('k-nama').value = ""; document.getElementById('k-harga').value = ""; document.getElementById('k-qty').value = ""; document.getElementById('k-nama').focus(); }
        function escapeHTML(str) { return str ? str.toString().replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : ""; }
        function saveData() { localStorage.setItem(KEY, JSON.stringify(db)); localStorage.setItem('BARLA_CART', JSON.stringify(cart)); refreshDL(); if (!document.getElementById('section-stok').classList.contains('hidden')) renderStok(curTab); }
        function formatRupiah(el) { let v = el.value.replace(/[^0-9]/g, ""); el.value = v ? new Intl.NumberFormat('id-ID').format(v) : ""; if (el.id === 'i-bayar') updateChange(); }
        function clean(s) { return parseInt(s.toString().replace(/[^0-9]/g, "")) || 0; }
        function refreshClock() { const optD = { day: '2-digit', month: 'short', year: 'numeric' }; const optT = { hour: '2-digit', minute: '2-digit', hour12: false }; const now = new Date(); const tgl = now.toLocaleDateString('id-ID', optD); const jam = now.toLocaleTimeString('id-ID', optT).replace(/\./g, ':'); document.getElementById('h-time').innerHTML = `<span class="text-white">${tgl}</span> <span class="text-[#ff0000] font-black ml-1">${jam}</span>`; }
        function getTglStr() { return new Date().toLocaleDateString('id-ID', {day: '2-digit', month: '2-digit', year: '2-digit'}).replace(/\//g, '.'); }
        function getJamStr() { return new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'}).replace(/\./g, ':'); }

        async function matikanKamera() { if (isScanning && html5QrCode) { try { const state = html5QrCode.getState(); if (state === 2) await html5QrCode.stop(); } catch(e) {} isScanning = false; } document.getElementById('modal-kamera').style.display = 'none'; }

        async function bukaKameraPopup(target = 'auto') {
            if (isScanning) return;
            document.getElementById('modal-kamera').style.display = 'flex';
            isScanning = true;
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 30 }, (decoded) => {
                    const code = decoded.trim();
                    matikanKamera();
                    if (target === 'auto') {
                        let f = null; db.supplier.forEach(s => s.barang.forEach(b => { if (b.bc === code) f = b; }));
                        if (f) { document.getElementById('k-nama').value = f.nama; document.getElementById('k-harga').value = f.harga.toLocaleString('id-ID'); document.getElementById('k-qty').value = Math.abs(parseInt(document.getElementById('k-qty').value)) || 1; tambahItem(); } 
                        else { openModal("BARCODE TIDAK ADA", "", "PRODUK BELUM TERDAFTAR.", null, "alert"); }
                    } else if (target === 'modal') { document.getElementById('m-input').value = code; } 
                    else { document.getElementById(target).value = code; }
                });
            } catch (err) { matikanKamera(); openModal("GAGAL", "", "Kamera Error.", null, "alert"); }
        }

        function handleInputNama(el) {
            let val = el.value; if (!val) { document.getElementById('k-harga').value = ""; return; }
            el.value = val.split(' ').map(w => /^(PVC|SNI|P\/C)$/i.test(w) ? w.toUpperCase() : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            let found = null;
            db.supplier.forEach(s => s.barang.forEach(b => { if (b.nama.toUpperCase() === el.value.toUpperCase() || b.bc === el.value) { if (b.stok > 0) found = b; else if (!found) found = b; } }));
            if (found) { document.getElementById('k-harga').value = found.harga.toLocaleString('id-ID'); document.getElementById('k-qty').focus(); }
        }

        function handleModalInput(el) { const title = document.getElementById('m-title').innerText; if (title.includes("HARGA")) { let v = el.value.replace(/[^0-9]/g, ""); el.value = v ? new Intl.NumberFormat('id-ID').format(v) : ""; } }

        function refreshDL() {
            const dl = document.getElementById('db-list'); dl.innerHTML = "";
            db.supplier.forEach(s => s.barang.forEach(b => {
                const inC = cart.find(x => x.nama.toUpperCase() === b.nama.toUpperCase() && x.harga === b.harga);
                if (b.stok > 0 && (!inC || inC.qty < b.stok)) {
                    let o = document.createElement('option'); o.value = b.nama; o.innerText = `Rp ${b.harga.toLocaleString('id-ID')} | Sisa: ${inC ? (b.stok - inC.qty) : b.stok}`; dl.appendChild(o);
                }
            }));
        }

        function tambahItem() {
            const nI = document.getElementById('k-nama'), hI = document.getElementById('k-harga'), qI = document.getElementById('k-qty');
            const n = nI.value.trim(), h = clean(hI.value); let q = Math.abs(parseInt(qI.value)) || 1;
            if (!n || h <= 0) return;
            let totalStok = 0; db.supplier.forEach(s => s.barang.forEach(b => { if (b.nama.toUpperCase() === n.toUpperCase() && b.harga === h) totalStok += b.stok; }));
            if (totalStok === 0) { openModal("TIDAK ADA", "", `Barang tidak ada di stok!`, null, "alert"); return; }
            let inC = cart.find(x => x.nama.toUpperCase() === n.toUpperCase() && x.harga === h);
            if ((inC ? inC.qty + q : q) > totalStok) { openModal("KURANG", "", `Sisa stok ${n}: ${totalStok}`, null, "alert"); return; }
            if (inC) inC.qty += q; else cart.push({ nama: n, harga: h, qty: q });
            clearKasir(); saveData(); renderCart(); refreshDL();
        }

        function ubahQty(idx, delta) {
            let item = cart[idx]; let totalStok = 0;
            db.supplier.forEach(s => s.barang.forEach(b => { if(b.nama.toUpperCase() === item.nama.toUpperCase() && b.harga === item.harga) totalStok += b.stok; }));
            if (item.qty + delta <= 0) cart.splice(idx, 1);
            else if (item.qty + delta > totalStok) openModal("STOK HABIS", "", `Maksimal stok: ${totalStok}`, null, "alert");
            else item.qty += delta;
            saveData(); renderCart(); refreshDL();
        }

                </div>`;

        function promptQty(idx) {
            let item = cart[idx];
            openModal("EDIT JUMLAH", item.qty.toString(), `Jumlah untuk ${item.nama}:`, (v) => {
                let nQ = Math.abs(parseInt(v)) || 0;
                if (nQ === 0) cart.splice(idx, 1);
                else {
                    let totalStok = 0; db.supplier.forEach(s => s.barang.forEach(b => { if(b.nama.toUpperCase() === item.nama.toUpperCase() && b.harga === item.harga) totalStok += b.stok; }));
                    if (nQ > totalStok) { openModal("STOK KURANG", "", `Maksimal: ${totalStok}`, null, "alert"); return; }
                    item.qty = nQ;
                }
                saveData(); renderCart(); refreshDL();
            }, "prompt", "numeric");

        function updateChange() {
            const t = cart.reduce((s, i) => s + (i.harga * i.qty), 0);
            const bStr = document.getElementById('i-bayar').value;
            const b = bStr ? clean(bStr) : 0;
            const box = document.getElementById('b-kembali');
            const tKembali = document.getElementById('t-kembali');

            if (cart.length > 0 && bStr !== "") {
                box.classList.remove('hidden');
                let diff = b - t;
                if (diff < 0) {
                    tKembali.innerText = "-Rp " + Math.abs(diff).toLocaleString('id-ID');
                    tKembali.className = "text-sm font-black text-[#ff0000]";
                } else {
                    tKembali.innerText = "Rp " + diff.toLocaleString('id-ID');
                    tKembali.className = "text-sm font-black text-white";
                }
            } else {
                box.classList.add('hidden');
            }
        }

        function checkout(tipe) {
            const t = cart.reduce((s, i) => s + (i.harga * i.qty), 0), b = clean(document.getElementById('i-bayar').value);
            if (cart.length === 0) { openModal("KOSONG", "", "Keranjang masih kosong!", null, "alert"); return; }
            if (b < t) { openModal("KURANG", "", `Kurang: Rp ${(t-b).toLocaleString('id-ID')}`, null, "alert"); return; }
            for (let c of cart) {
                let sT = 0; db.supplier.forEach(s => s.barang.forEach(brg => { if(brg.nama.toUpperCase() === c.nama.toUpperCase() && brg.harga === c.harga) sT += brg.stok; }));
                if (c.qty > sT) { openModal("BERUBAH", "", `Stok ${c.nama} berubah!`, () => { cart = []; saveData(); renderCart(); }, "alert"); return; }
            }
            cart.forEach(iC => { let sisa = iC.qty; db.supplier.forEach(s => s.barang.forEach(brg => {
                if (brg.nama.toUpperCase() === iC.nama.toUpperCase() && brg.harga === iC.harga && sisa > 0) {
                    if (brg.stok >= sisa) { brg.stok -= sisa; sisa = 0; } else { sisa -= brg.stok; brg.stok = 0; }
                }
            })); });
            const trxId = Date.now();
            db.history.unshift({ id: trxId, waktu: `${getTglStr()}-${getJamStr()}`, items: JSON.parse(JSON.stringify(cart)), total: t, bayar: b, kembali: b-t });
            if (db.history.length > 50) db.history.pop();
            if (tipe === 'print') cetakUlang(trxId); else if (tipe === 'wa') waUlang(trxId);
            cart = []; document.getElementById('i-bayar').value = ""; saveData(); renderCart(); refreshDL();
        }

        function cetakUlang(id) {

            let h = `          BARLA STORE          \n     Ps. Sunggingan Lt. 2      \n        0822-2633-4999         \n-------------------------------\n`;

        function closeSheet(e) { if (e && e.target.id !== 'a-sheet') return; const s = document.getElementById('a-sheet'); s.classList.remove('sheet-active'); setTimeout(() => s.style.display = 'none', 300); }

        function action(type) {
            closeSheet(); const brg = db.supplier[selS].barang[selB];
            if (type === 'stok') openModal("EDIT STOK", brg.stok.toString(), brg.nama, (v) => { db.supplier[selS].barang[selB].stok = Math.abs(parseInt(v))||0; cart=[]; saveData(); }, "prompt", "numeric");
            if (type === 'harga') openModal("EDIT HARGA", brg.harga.toLocaleString('id-ID'), brg.nama, (v) => { 
                let nH = clean(v); let oH = db.supplier[selS].barang[selB].harga;
                db.supplier[selS].barang[selB].harga = nH; 
                let cItem = cart.find(x => x.nama.toUpperCase() === brg.nama.toUpperCase() && x.harga === oH);
                if (cItem) cItem.harga = nH;
                saveData(); renderCart(); refreshDL();
            }, "prompt", "numeric");
            if (type === 'barcode') openModal("EDIT BARCODE", brg.bc||"", brg.nama, (v) => { if(v && db.supplier.some(s=>s.barang.some(b=>b.bc===v.trim() && b.nama!==brg.nama))) return openModal("DUPLIKAT","","Barcode sudah dipakai!",null,"alert"); db.supplier[selS].barang[selB].bc = v.trim(); saveData(); }, "prompt", "text", true);
            if (type === 'retur') openModal("RETUR", "", brg.nama, (v) => { let q = Math.abs(parseInt(v))||0; if(q<=0||q>brg.stok) return openModal("GAGAL","","Jumlah tidak valid!",null,"alert"); db.supplier[selS].barang[selB].stok -= q; let ada = db.retur.find(r=>r.sup===db.supplier[selS].nama && r.nama===brg.nama); if(ada) ada.qty+=q; else db.retur.push({sup:db.supplier[selS].nama, nama:brg.nama, qty:q}); cart=[]; saveData(); }, "prompt", "numeric");
            if (type === 'hapus') openModal("HAPUS?", "", `Hapus ${brg.nama}?`, () => { db.retur=db.retur.filter(r=>!(r.sup===db.supplier[selS].nama && r.nama===brg.nama)); cart=[]; db.supplier[selS].barang.splice(selB,1); saveData(); }, "confirm");
        }

        function editSupplier(i) { closeSheet(); let old = db.supplier[i].nama; openModal("EDIT NAMA SUPPLIER", old, "", (v) => { let n = v.trim(); if(!n||db.supplier.some(s=>s.nama.toUpperCase()===n.toUpperCase() && s.nama!==old)) return openModal("GAGAL","","Nama sudah ada!",null,"alert"); db.retur.forEach(r=>{if(r.sup===old) r.sup=n;}); db.supplier[i].nama = n; saveData(); }, "prompt"); }
        function openModalSup() { openModal("TAMBAH SUPPLIER", "", "", (v) => { if(v.trim()) { db.supplier.unshift({nama:v.trim(), barang:[]}); saveData(); } }, "prompt"); }
        function delSup(n) { closeSheet(); openModal("HAPUS?", "", `Hapus Supplier ${n}?`, () => { db.retur=db.retur.filter(x=>x.sup!==n); db.supplier=db.supplier.filter(x=>x.nama!==n); openIdx=null; cart=[]; saveData(); }, "confirm"); }
        
        function addB(i) {
            const n = document.getElementById(`ib-n-${i}`).value.trim(), bc = document.getElementById(`ib-bc-${i}`).value.trim(), h = clean(document.getElementById(`ib-h-${i}`).value), s = Math.abs(parseInt(document.getElementById(`ib-s-${i}`).value))||0;
            if(!n||h<=0) return;
            if(db.supplier.some(sup=>sup.barang.some(b=>b.nama.toUpperCase()===n.toUpperCase()))) return openModal("DUPLIKAT","","Nama barang sudah ada!",null,"alert");
            if(bc && db.supplier.some(sup=>sup.barang.some(b=>b.bc===bc))) return openModal("DUPLIKAT","","Barcode sudah dipakai!",null,"alert");
            db.supplier[i].barang.unshift({nama:n, bc, harga:h, stok:s}); saveData(); document.querySelectorAll(`[id^='ib-']`).forEach(inp => inp.value="");
        }

        function openModal(t, v, d, cb, mode='alert', type='text', withScan=false) {
            const m = document.getElementById('b-modal'), inpBox = document.getElementById('m-input-box'), inp = document.getElementById('m-input'), btnC = document.getElementById('m-cancel'), btnOk = document.getElementById('m-confirm'), btnS = document.getElementById('m-scan-btn'), mBrd = document.getElementById('m-border');
            document.getElementById('m-title').innerText = t; document.getElementById('m-desc').innerText = d; inp.value = v; inp.inputMode = type==="numeric"?"numeric":"text";
            inpBox.style.display = (mode==='prompt')?'flex':'none'; btnC.style.display = (mode!=='alert')?'block':'none'; btnS.style.display = withScan?'flex':'none';
            
            let btnColor = "bg-[#3b82f6]"; let textColor = "text-white"; let bColor = "#3b82f6";
            
            if (t.includes("HAPUS?")) { btnColor = "bg-[#ff0000]"; bColor = "#ff0000"; } 
            else if (t.includes("RETUR")) { btnColor = "bg-[#facc15]"; bColor = "#facc15"; textColor = "text-black"; }
            else if (t.includes("SUPPLIER")) { btnColor = "bg-[#ffd700]"; bColor = "#ffd700"; textColor = "text-black"; }
            else if (t.includes("EDIT BARCODE")) { btnColor = "bg-[#ffffff]"; bColor = "#ffffff"; textColor = "text-black"; }
            else if (d.includes("EXCEL")) { btnColor = "bg-[#217346]"; bColor = "#217346"; textColor = "text-white"; }
            else if (t.includes("SUKSES") || t.includes("UPLOADING") || t.includes("DOWNLOADING")) { btnColor = "bg-[#38bdf8]"; bColor = "#38bdf8"; textColor = "text-black"; }
            else if (t.includes("EDIT HARGA") || t.includes("EDIT STOK")) { btnColor = "bg-[#3b82f6]"; bColor = "#3b82f6"; }
            else { btnColor = "bg-[#3b82f6]"; bColor = "#3b82f6"; }
            
            if(!t.includes("UPLOADING") && !t.includes("DOWNLOADING")) btnOk.style.display = "block"; else btnOk.style.display = "none";
            btnOk.className = `flex-1 py-3 ${btnColor} ${textColor} rounded-xl text-xs font-black shadow-sm uppercase active:scale-95 transition`;
            mBrd.style.borderTopColor = bColor;
            inpBox.style.borderColor = bColor;
            
            btnS.onclick = () => bukaKameraPopup('modal');
            btnOk.onclick = () => { if(cb) mode==='prompt'?cb(inp.value):cb(); closeModal(); };
            m.style.display = 'flex'; if(mode==='prompt') setTimeout(()=>inp.focus(),300);
        }
        function closeModal() { document.getElementById('b-modal').style.display = 'none'; }
        
        function exportData() { 
            let dStok = []; 
            db.supplier.forEach(s=>s.barang.forEach(b=>dStok.push({"Supplier":s.nama,"Barang":b.nama,"Barcode":b.bc||"","Harga":b.harga,"Stok":b.stok}))); 
            const wsStok = XLSX.utils.json_to_sheet(dStok); 
            
            let dHist = [];
            db.history.forEach(trx => {
                trx.items.forEach(i => {
                    dHist.push({
                        "Waktu": trx.waktu,
                        "ID Transaksi": trx.id,
                        "Barang": i.nama,
                        "Qty": i.qty,
                        "Harga Satuan": i.harga,
                        "Total Harga": i.harga * i.qty
                    });
                });
            });
            const wsHist = XLSX.utils.json_to_sheet(dHist);

            let dRet = [];
            db.retur.forEach(r => {
                dRet.push({
                    "Supplier": r.sup,
                    "Barang": r.nama,
                    "Qty Retur": r.qty
                });
            });
            const wsRet = XLSX.utils.json_to_sheet(dRet);

            const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, wsStok, "Stok"); 
            XLSX.utils.book_append_sheet(wb, wsHist, "History"); 
            XLSX.utils.book_append_sheet(wb, wsRet, "Retur"); 
            XLSX.writeFile(wb, "DATA_BARLA.xlsx"); 
        }

        function importData(input) { if(!input.files[0]) return; const reader = new FileReader(); reader.readAsArrayBuffer(input.files[0]); reader.onload = (e) => { try { const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'}); const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]); json.forEach(row => { const sN = (row["Supplier"]||"").toString().trim(), bN = (row["Barang"]||"").toString().trim(), bc = (row["Barcode"]||"").toString().trim(), pr = clean(row["Harga"]||"0"), st = Math.abs(parseInt(row["Stok"]||"0"))||0; if(sN && bN) { let sup = db.supplier.find(x=>x.nama.toLowerCase()===sN.toLowerCase()); if(!sup){ sup={nama:sN, barang:[]}; db.supplier.unshift(sup); } let brg = sup.barang.find(x=>x.nama.toLowerCase()===bN.toLowerCase()); if(brg){ brg.bc=bc; brg.harga=pr; brg.stok=st; } else sup.barang.unshift({nama:bN, bc, harga:pr, stok:st}); } }); saveData(); openModal("SUKSES","","LOAD DARI EXCEL!",()=>{ renderStok(curTab); refreshDL(); },"alert"); } catch(err) { openModal("ERROR","","Format salah!",null,"alert"); } input.value = ""; }; }
        
        function printReturSemua() { 
            let h = `          BARLA STORE          \n     Ps. Sunggingan Lt. 2      \n        0822-2633-4999         \n-------------------------------\n`; 
            let tStr = `Semua Data Retur - ${getTglStr()}`.padEnd(31, ' ');
            h += `${tStr}\n-------------------------------\n`; 
            const g = db.retur.reduce((a,r)=>{(a[r.sup]=a[r.sup]||[]);a[r.sup].push(r);return a;},{}); 
            let first = true;
            for(let s in g){ 
                if(!first) h += `\n`;
                h += `• ${escapeHTML(s).toUpperCase().substring(0,29)}\n\n`; 
                g[s].forEach(r=> { 
                    let nm = escapeHTML(r.nama).substring(0, 18).padEnd(18, ' '); 
                    let q = r.qty.toString().padStart(4, ' ') + " pcs"; 
                    h += `${nm} ${q}\n`; 
                }); 
                first = false;
            } 
            h += `-------------------------------\n`;
            document.getElementById('p-konten').innerHTML = `<pre>${h}</pre>`; window.print(); 
        }
        
        function printReturSup(sn) { 
            let h = `          BARLA STORE          \n     Ps. Sunggingan Lt. 2      \n        0822-2633-4999         \n-------------------------------\n`; 
            let tStr = `Data Retur - ${getTglStr()}`.padEnd(31, ' ');
            h += `${tStr}\n-------------------------------\n`; 
            h += `• ${escapeHTML(sn).toUpperCase().substring(0,29)}\n\n`; 
            db.retur.filter(x=>x.sup===sn).forEach(r=> { 
                let nm = escapeHTML(r.nama).substring(0, 18).padEnd(18, ' '); 
                let q = r.qty.toString().padStart(4, ' ') + " pcs"; 
                h += `${nm} ${q}\n`; 
            }); 
            h += `-------------------------------\n`;
            document.getElementById('p-konten').innerHTML = `<pre>${h}</pre>`; window.print(); 
        }
        
        function printLapSemua() { 
            let h = `          BARLA STORE          \n     Ps. Sunggingan Lt. 2      \n        0822-2633-4999         \n-------------------------------\n`; 
            let tStr = `Semua Laporan - ${getTglStr()}`.padEnd(31, ' ');
            h += `${tStr}\n-------------------------------\n`; 
            let has = false; let first = true;
            db.supplier.forEach(s=>{ 
                const k=s.barang.filter(b=>b.stok<30); 
                if(k.length>0){ 
                    has=true; 
                    if(!first) h += `\n`;
                    h += `• ${escapeHTML(s.nama).toUpperCase().substring(0,29)}\n\n`; 
                    k.forEach(b=>{ 
                        let nm = escapeHTML(b.nama).substring(0, 18).padEnd(18, ' '); 
                        let sisa = `Sisa: ${b.stok}`.padStart(9, ' '); 
                        h += `${nm} ${sisa}\n`; 
                    }); 
                    first = false;
                } 
            }); 
            h += `-------------------------------\n`;
            if(!has) return openModal("AMAN","","Semua stok cukup.",null,"alert"); 
            document.getElementById('p-konten').innerHTML=`<pre>${h}</pre>`; window.print(); 
        }
        
        function waR(sn) { 
            let h = `          BARLA STORE          \n     Ps. Sunggingan Lt. 2      \n-------------------------------\n`; 
            let tStr = `Data Retur - ${getTglStr()}`.padEnd(31, ' ');
            h += `${tStr}\n-------------------------------\n`; 
            h += `• ${sn.toUpperCase().substring(0,29)}\n\n`; 
            db.retur.filter(x=>x.sup===sn).forEach(r=> { 
                let nm = r.nama.substring(0, 18).padEnd(18, ' '); 
                let q = r.qty.toString().padStart(4, ' ') + " pcs"; 
                h += `${nm} ${q}\n`; 
            }); 
            window.open(`https://wa.me/?text=${encodeURIComponent("```\n" + h + "```")}`); 
        }
        
        function waO(i) { 
            let s=db.supplier[i]; 
            let h = `          BARLA STORE          \n     Ps. Sunggingan Lt. 2      \n-------------------------------\n`; 
            let tStr = `Order - ${getTglStr()}`.padEnd(31, ' ');
            h += `${tStr}\n-------------------------------\n`; 
            h += `• ${s.nama.toUpperCase().substring(0,29)}\n\n`; 
            s.barang.filter(b=>b.stok<30).forEach(b=> { 
                let nm = b.nama.substring(0, 18).padEnd(18, ' '); 
                h += `${nm}: \n`; 
            }); 
            window.open(`https://wa.me/?text=${encodeURIComponent("```\n" + h + "```")}`); 
        }
        
        function trHR(sn) { openModal("HAPUS?", "", `Data retur ${sn} dihapus?`, () => { db.retur=db.retur.filter(x=>x.sup!==sn); saveData(); renderStok('retur'); }, "confirm"); }
    </script>
